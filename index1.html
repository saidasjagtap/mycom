<script>
'use strict';

// ============================================================
// CONSTANTS & CONFIGURATION
// ============================================================
const STAGES = [
  { id: 'NOT_STARTED', label: 'Not Started', idx: 0, color: '#9ca3af' },
  { id: 'SITE_MANAGER_APPROVAL', label: 'Site Mgr Approval', idx: 1, color: '#f59e0b' },
  { id: 'CHANGE_CREATION', label: 'Change Creation', idx: 2, color: '#f97316' },
  { id: 'PEER_REVIEW', label: 'Peer Review', idx: 3, color: '#8b5cf6' },
  { id: 'PEER_APPROVAL', label: 'Peer Approval', idx: 4, color: '#6366f1' },
  { id: 'CAP_APPROVAL', label: 'CAP Approval', idx: 5, color: '#14b8a6' },
  { id: 'CAB_APPROVAL', label: 'CAB Approval', idx: 6, color: '#ec4899' },
  { id: 'SCHEDULING', label: 'Scheduling', idx: 7, color: '#3b82f6' },
  { id: 'UPGRADE_EXECUTION', label: 'Upgrade Execution', idx: 8, color: '#0ea5e9' },
  { id: 'VALIDATION', label: 'Validation', idx: 9, color: '#22c55e' },
  { id: 'CLOSURE', label: 'Closure', idx: 10, color: '#16a34a' },
];
const STAGE_MAP = Object.fromEntries(STAGES.map(s => [s.id, s]));
const STAGE_IDS = STAGES.map(s => s.id);

const ROLES = { ADMIN: 'admin', REGIONAL_MANAGER: 'regional_manager', ENGINEER: 'engineer', VIEWER: 'viewer' };

const PERMISSIONS = {
  sync_panorama:    ['admin'],
  edit_device:      ['admin', 'regional_manager'],
  approve:          ['admin', 'regional_manager'],
  reject:           ['admin', 'regional_manager'],
  skip_stage:       ['admin'],
  bulk_action:      ['admin'],
  book_slot:        ['admin', 'regional_manager'],
  cancel_slot:      ['admin', 'regional_manager'],
  lock_slot:        ['admin'],
  update_execution: ['admin', 'regional_manager', 'engineer'],
  manage_users:     ['admin'],
  manage_settings:  ['admin'],
  export_data:      ['admin', 'regional_manager', 'engineer', 'viewer'],
  view_audit:       ['admin', 'regional_manager', 'engineer', 'viewer'],
};

const DEFAULT_REGIONS = ['AMER', 'EMEA', 'APAC', 'GLOBAL'];
const DEFAULT_TIME_SLOTS = ['00:00','02:00','04:00','06:00','08:00','10:00','12:00','14:00','16:00','18:00','20:00','22:00'];
const DEFAULT_TARGET_VERSIONS = ['11.2.1','11.1.4','11.1.3','11.0.5','10.2.10','10.1.14'];
const MAX_SLOTS_PER_REGION_TIME = 3;

const VIEW_TITLES = {
  dashboard: 'Dashboard', inventory: 'Firewall Inventory', 'device-detail': 'Device Details',
  scheduling: 'Upgrade Scheduling', program: 'Program Execution', settings: 'Settings', audit: 'Audit Log',
};

// ============================================================
// INDEXEDDB DATABASE LAYER
// ============================================================
const DB = {
  db: null, DB_NAME: 'pan_upgrade_tracker', DB_VERSION: 1,

  open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.DB_NAME, this.DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('devices')) {
          const s = db.createObjectStore('devices', { keyPath: 'serial_number' });
          s.createIndex('hostname','hostname',{unique:false});
          s.createIndex('model','model',{unique:false});
          s.createIndex('region','region',{unique:false});
          s.createIndex('stage','stage',{unique:false});
        }
        if (!db.objectStoreNames.contains('audit_log')) {
          const s = db.createObjectStore('audit_log', { keyPath: 'id', autoIncrement: true });
          s.createIndex('timestamp','timestamp',{unique:false});
          s.createIndex('user','user',{unique:false});
          s.createIndex('action','action',{unique:false});
          s.createIndex('device_serial','device_serial',{unique:false});
        }
        if (!db.objectStoreNames.contains('sync_history')) {
          const s = db.createObjectStore('sync_history', { keyPath: 'id', autoIncrement: true });
          s.createIndex('timestamp','timestamp',{unique:false});
        }
        if (!db.objectStoreNames.contains('schedule_slots')) {
          const s = db.createObjectStore('schedule_slots', { keyPath: 'id' });
          s.createIndex('date','date',{unique:false});
          s.createIndex('region','region',{unique:false});
          s.createIndex('device_serial','device_serial',{unique:false});
        }
        if (!db.objectStoreNames.contains('app_settings')) {
          db.createObjectStore('app_settings', { keyPath: 'key' });
        }
        if (!db.objectStoreNames.contains('users')) {
          const s = db.createObjectStore('users', { keyPath: 'username' });
          s.createIndex('role','role',{unique:false});
        }
      };
      req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
      req.onerror = (e) => reject(e.target.error);
    });
  },

  _tx(store, mode='readonly') {
    const tx = this.db.transaction(store, mode);
    return tx.objectStore(store);
  },

  getAll(store) {
    return new Promise((res, rej) => {
      const r = this._tx(store).getAll();
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },

  get(store, key) {
    return new Promise((res, rej) => {
      const r = this._tx(store).get(key);
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },

  put(store, data) {
    return new Promise((res, rej) => {
      const r = this._tx(store, 'readwrite').put(data);
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },

  del(store, key) {
    return new Promise((res, rej) => {
      const r = this._tx(store, 'readwrite').delete(key);
      r.onsuccess = () => res(); r.onerror = () => rej(r.error);
    });
  },

  clear(store) {
    return new Promise((res, rej) => {
      const r = this._tx(store, 'readwrite').clear();
      r.onsuccess = () => res(); r.onerror = () => rej(r.error);
    });
  },

  count(store) {
    return new Promise((res, rej) => {
      const r = this._tx(store).count();
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },

  getAllByIndex(store, indexName, value) {
    return new Promise((res, rej) => {
      const r = this._tx(store).index(indexName).getAll(value);
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },

  bulkPut(store, items) {
    return new Promise((res, rej) => {
      const tx = this.db.transaction(store, 'readwrite');
      const s = tx.objectStore(store);
      for (const item of items) s.put(item);
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error);
    });
  },

  async exportAll() {
    return {
      version: this.DB_VERSION,
      exported_at: new Date().toISOString(),
      write_id: Date.now(),
      devices: await this.getAll('devices'),
      audit_log: await this.getAll('audit_log'),
      sync_history: await this.getAll('sync_history'),
      schedule_slots: await this.getAll('schedule_slots'),
      app_settings: await this.getAll('app_settings'),
      users: await this.getAll('users'),
    };
  },

  async importAll(data) {
    for (const store of ['devices','audit_log','sync_history','schedule_slots','app_settings','users']) {
      if (data[store] && data[store].length > 0) {
        await this.clear(store);
        await this.bulkPut(store, data[store]);
      }
    }
  },
};

// TOAST NOTIFICATIONS
// ============================================================
const Toast = {
  show(msg, type='info', duration=3000) {
    const c = document.getElementById('toast-container');
    const colors = { info:'bg-blue-600', success:'bg-green-600', warning:'bg-yellow-500', error:'bg-red-600' };
    const el = document.createElement('div');
    el.className = `${colors[type]||colors.info} text-white px-4 py-2.5 rounded-lg shadow-lg text-sm flex items-center gap-2 toast-enter transition-transform duration-300`;
    el.innerHTML = `<span class="flex-1">${msg}</span><button class="opacity-70 hover:opacity-100 text-lg leading-none" onclick="this.parentElement.remove()">&times;</button>`;
    c.appendChild(el);
    requestAnimationFrame(() => el.classList.replace('toast-enter','toast-visible'));
    if (duration > 0) setTimeout(() => { el.classList.replace('toast-visible','toast-enter'); setTimeout(() => el.remove(), 300); }, duration);
  },
  success(m){ this.show(m,'success'); },
  error(m){ this.show(m,'error',5000); },
  warning(m){ this.show(m,'warning',4000); },
  info(m){ this.show(m,'info'); },
};

const Modal = {
  show(title, content, actions=[]) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = content;
    const actEl = document.getElementById('modal-actions');
    actEl.innerHTML = '';
    actions.forEach(a => {

      btn.textContent = a.label;
      btn.className = a.className || 'bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg text-sm font-medium';
      btn.onclick = () => { a.handler(); if (a.close !== false) this.hide(); };
      actEl.appendChild(btn);
    });
    document.getElementById('modal-overlay').classList.remove('hidden');
  },
  hide() { document.getElementById('modal-overlay').classList.add('hidden'); },
  confirm(title, msg, onConfirm) {
    this.show(title, `<p class="text-gray-600">${msg}</p>`, [
      { label:'Cancel', handler(){} },
      { label:'Confirm', className:'bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium', handler: onConfirm },
    ]);
  },
  prompt(title, msg, placeholder, onSubmit) {

      { label:'Cancel', handler(){} },

};

const Router = {
  currentView: null,

  init() {
    window.addEventListener('hashchange', () => this.handleRoute());
    if (!window.location.hash) window.location.hash = '#dashboard';
    this.handleRoute();
  },

  navigate(hash) { window.location.hash = hash; },

  handleRoute() {
    const hash = window.location.hash || '#dashboard';
    const parts = hash.substring(1).split('/');
    const route = parts[0];
    const params = parts.slice(1);

    document.querySelectorAll('.view-container').forEach(v => v.classList.add('hidden'));
    document.querySelectorAll('.nav-link').forEach(link => {
      link.classList.remove('bg-gray-700','text-white');
      link.classList.add('text-gray-300');
      if (link.dataset.route === route) {
        link.classList.add('bg-gray-700','text-white');
        link.classList.remove('text-gray-300');
      }
    });

    const viewEl = document.getElementById(`view-${route}`);
    if (viewEl) {
      viewEl.classList.remove('hidden');
      this.currentView = route;
      document.getElementById('view-title').textContent = VIEW_TITLES[route] || route;
      if (Views[route]) Views[route].render(params);
    } else {
      this.navigate('#dashboard');
    }
  },
};

// ============================================================
// AUTHENTICATION & RBAC
// ============================================================
const Auth = {
  currentUser: null,

  async init() {
    const session = await DB.get('app_settings','current_user');
    if (session && session.value) {
      // Validate saved session against current APP_USERS config
      const users = window.APP_USERS || [];
      const userRecord = users.find(u => u.username === session.value.username);
      if (userRecord) {
        // Update role/region from config in case it changed
        session.value.role = userRecord.role;
        session.value.region = userRecord.region;
        this.currentUser = session.value;
        this.showApp();
      } else {
        // User no longer in config, force re-login
        await DB.del('app_settings','current_user');
        this.showLogin();
      }
    } else {
      this.showLogin();
    }
  },

  async login(username, password) {
    username = username.trim();
    if (!username) { Toast.error('Username is required'); return false; }
    if (!password) { Toast.error('Password is required'); return false; }

    const users = window.APP_USERS || [];
    const userRecord = users.find(u => u.username === username && u.password === password);
    if (!userRecord) {
      Toast.error('Invalid username or password');
      return false;
    }

    const role = userRecord.role;
    const region = userRecord.region;
    this.currentUser = { username, role, region, logged_in_at: new Date().toISOString() };
    await DB.put('app_settings', { key:'current_user', value: this.currentUser });
    const existing = await DB.get('users', username);
    if (!existing) {
      await DB.put('users', { username, role, region, created_at: new Date().toISOString() });
    } else {
      await DB.put('users', { ...existing, role, region, last_login: new Date().toISOString() });
    }
    await AuditLog.log('LOGIN', null, { role, region });
    this.showApp();
    Toast.success(`Welcome, ${username}`);
    return true;
  },

  async logout() {
    await AuditLog.log('LOGOUT');
    await DB.del('app_settings','current_user');
    this.currentUser = null;
    this.showLogin();
  },

  showLogin() {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app-shell').classList.add('hidden');
  },

  showApp() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-shell').classList.remove('hidden');
    this.updateDisplay();
    Router.init();
  },

  updateDisplay() {
    if (!this.currentUser) return;
    const u = this.currentUser;
    document.getElementById('current-user-display').textContent = u.username;
    document.getElementById('current-user-role').textContent = `${u.role.replace(/_/g,' ')} \u2022 ${u.region}`;
    document.getElementById('user-avatar').textContent = u.username.charAt(0).toUpperCase();
  },

  can(action, ctx={}) {
    if (!this.currentUser) return false;
    const role = this.currentUser.role;
    if (role === 'admin') return true;
    const allowed = PERMISSIONS[action];
    if (!allowed || !allowed.includes(role)) return false;
    if (role === 'regional_manager' && ctx.region) {
      if (this.currentUser.region !== 'GLOBAL' && this.currentUser.region !== ctx.region) return false;
    }
    if (role === 'engineer' && ctx.device) {
      if (ctx.device.assigned_engineer !== this.currentUser.username) return false;
    }
    return true;
  },

  isAdmin() { return this.currentUser?.role === 'admin'; },
};

async function handleLogin() {
  const username = document.getElementById('login-username').value;
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  const success = await Auth.login(username, password);
  if (!success) {
    errorEl.textContent = 'Invalid username or password';
    errorEl.classList.remove('hidden');
  } else {
    errorEl.classList.add('hidden');
  }
}

function esc(str) {

function formatDate(iso) {
  if (!iso) return '-';
  try { return dayjs(iso).format('YYYY-MM-DD HH:mm'); } catch { return iso; }
}
function relTime(iso) {
  if (!iso) return '-';
  try { return dayjs(iso).fromNow(); } catch { return iso; }
}
function stageLabel(id) { return STAGE_MAP[id]?.label || id; }
function stageColor(id) { return STAGE_MAP[id]?.color || '#9ca3af'; }
function stageIdx(id) { return STAGE_MAP[id]?.idx ?? 0; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,6); }
function debounce(fn, ms=300) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

function renderStageBar(currentStage) {
  const idx = stageIdx(currentStage);
  return `<div class="flex gap-0.5">${STAGES.map(s => {
    const done = s.idx < idx;
    const active = s.idx === idx;
    const bg = done ? 'bg-green-500' : active ? `bg-blue-500` : 'bg-gray-200';

    return `<div class="stage-bar-segment flex-1 h-6 ${bg} ${text} text-[9px] flex items-center justify-center rounded-sm" title="${s.label}">${s.idx}</div>`;
  }).join('')}</div>`;
}

// ============================================================
// PANORAMA HTML PARSER
// ============================================================
const PanoramaParser = {
  // Known column names from Panorama device list
  KNOWN_COLUMNS: {
    serial: ['serial','serial number','serial_number','serial#','serialnumber','sn'],
    hostname: ['hostname','host name','device name','devicename','name','device_name','host'],
    model: ['model','platform','device model','hw model','hardware'],
    ip_address: ['ip address','ip','mgmt ip','management ip','ip_address','mgmt_ip'],
    sw_version: ['sw version','software version','panos version','pan-os','version','current version','sw_version','panos','os version','running version'],
    ha_state: ['ha state','ha','ha status','high availability','ha_state','ha mode'],
    ha_peer_serial: ['ha peer serial','ha peer','peer serial','ha_peer_serial','peer_serial'],
    uptime: ['uptime','up time','system uptime'],
    connection_status: ['connected','connection','status','connection status','connection_status','conn status'],
    last_seen: ['last connected','last seen','last check-in','last_seen','last contact'],
    ipv6_address: ['ipv6','ipv6 address','ipv6_address'],
    mac_address: ['mac','mac address','mac_address'],
    tags: ['tags','labels','device tags'],
    device_group: ['device group','dg','device_group','devicegroup'],
    template: ['template','template stack','template_stack'],
    vsys: ['vsys','virtual system','virtual_system'],
  },

  // Auto-detect column mapping from header row
  detectColumns(headers) {
    const mapping = {};
    const normalized = headers.map(h => h.toLowerCase().trim().replace(/[^a-z0-9 _]/g,''));
    for (const [field, aliases] of Object.entries(this.KNOWN_COLUMNS)) {
      for (let i = 0; i < normalized.length; i++) {
        if (aliases.some(a => normalized[i] === a || normalized[i].includes(a))) {
          mapping[field] = i;
          break;
        }
      }
    }
    return mapping;
  },

  // Parse HTML table from Panorama export
  parseHTML(htmlString) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlString, 'text/html');
    const tables = doc.querySelectorAll('table');
    if (tables.length === 0) throw new Error('No tables found in HTML file');

    // Find the largest table (most likely the device list)
    let bestTable = tables[0];
    let maxRows = 0;
    tables.forEach(t => {
      const rows = t.querySelectorAll('tr');
      if (rows.length > maxRows) { maxRows = rows.length; bestTable = t; }
    });

    const rows = bestTable.querySelectorAll('tr');
    if (rows.length < 2) throw new Error('Table has fewer than 2 rows');

    // Get headers from first row
    const headerCells = rows[0].querySelectorAll('th, td');
    const headers = Array.from(headerCells).map(c => c.textContent.trim());
    const colMap = this.detectColumns(headers);

    if (!colMap.serial && !colMap.hostname) {
      throw new Error('Could not detect serial number or hostname columns. Headers found: ' + headers.join(', '));
    }

    const devices = [];
    for (let i = 1; i < rows.length; i++) {
      const cells = rows[i].querySelectorAll('td');
      if (cells.length === 0) continue;
      const cellTexts = Array.from(cells).map(c => c.textContent.trim());

      const device = {};
      for (const [field, colIdx] of Object.entries(colMap)) {
        if (colIdx < cellTexts.length) device[field] = cellTexts[colIdx];
      }
      // Skip rows with no serial and no hostname
      if (!device.serial && !device.hostname) continue;
      // Use hostname as serial fallback
      if (!device.serial) device.serial = device.hostname;
      devices.push(device);
    }

    return { devices, headers, colMap, tableCount: tables.length, rowCount: rows.length };
  },

  // Parse CSV data
  parseCSV(csvString) {
    const lines = csvString.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) throw new Error('CSV has fewer than 2 lines');

    // Parse header
    const headers = this._parseCSVLine(lines[0]);
    const colMap = this.detectColumns(headers);

    if (!colMap.serial && !colMap.hostname) {
      throw new Error('Could not detect serial or hostname columns. Headers: ' + headers.join(', '));
    }

    const devices = [];
    for (let i = 1; i < lines.length; i++) {
      const fields = this._parseCSVLine(lines[i]);
      if (fields.length === 0) continue;
      const device = {};
      for (const [field, colIdx] of Object.entries(colMap)) {
        if (colIdx < fields.length) device[field] = fields[colIdx];
      }
      if (!device.serial && !device.hostname) continue;
      if (!device.serial) device.serial = device.hostname;
      devices.push(device);
    }

    return { devices, headers, colMap, rowCount: lines.length };
  },

  _parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
        else if (ch === '"') inQuotes = false;
        else current += ch;
      } else {
        if (ch === '"') inQuotes = true;
        else if (ch === ',') { result.push(current.trim()); current = ''; }
        else current += ch;
      }
    }
    result.push(current.trim());
    return result;
  },

  // Parse pasted table data (tab-separated)
  parsePaste(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) throw new Error('Pasted data has fewer than 2 lines');

    const sep = lines[0].includes('\t') ? '\t' : /\s{2,}/;
    const headers = lines[0].split(sep).map(h => h.trim());
    const colMap = this.detectColumns(headers);

    if (!colMap.serial && !colMap.hostname) {
      throw new Error('Could not detect serial or hostname columns');
    }

    const devices = [];
    for (let i = 1; i < lines.length; i++) {
      const fields = lines[i].split(sep).map(f => f.trim());
      if (fields.length === 0) continue;
      const device = {};
      for (const [field, colIdx] of Object.entries(colMap)) {
        if (colIdx < fields.length) device[field] = fields[colIdx];
      }
      if (!device.serial && !device.hostname) continue;
      if (!device.serial) device.serial = device.hostname;
      devices.push(device);
    }

    return { devices, headers, colMap, rowCount: lines.length };
  },
};

// ============================================================
// SYNC ENGINE
// ============================================================
const SyncEngine = {
  async sync(parsedDevices, source='html_upload') {
    const results = { new_count: 0, updated_count: 0, missing_count: 0, errors: [], total: parsedDevices.length };
    const now = new Date().toISOString();
    const existingDevices = await DB.getAll('devices');
    const existingMap = new Map(existingDevices.map(d => [d.serial_number, d]));
    const seenSerials = new Set();

    for (const parsed of parsedDevices) {
      try {
        const serial = (parsed.serial || '').trim();
        if (!serial) { results.errors.push('Skipped device with no serial'); continue; }
        seenSerials.add(serial);
        const existing = existingMap.get(serial);

        if (existing) {
          // Update ONLY safe fields — never overwrite workflow/approval data
          const updated = { ...existing };
          if (parsed.hostname) updated.hostname = parsed.hostname;
          if (parsed.model) updated.model = parsed.model;
          if (parsed.sw_version) updated.current_version = parsed.sw_version;
          if (parsed.ha_state) updated.ha_state = parsed.ha_state;
          if (parsed.ha_peer_serial) updated.ha_peer_serial = parsed.ha_peer_serial;
          if (parsed.ip_address) updated.ip_address = parsed.ip_address;
          if (parsed.connection_status) updated.connection_status = parsed.connection_status;
          if (parsed.device_group) updated.device_group = parsed.device_group;
          if (parsed.template) updated.template = parsed.template;
          if (parsed.uptime) updated.uptime = parsed.uptime;
          if (parsed.last_seen) updated.last_seen_panorama = parsed.last_seen;
          updated.last_sync = now;
          updated.sync_source = source;
          updated.sync_status = 'SYNCED';
          await DB.put('devices', updated);
          results.updated_count++;
        } else {
          // New device
          const newDevice = {
            serial_number: serial,
            hostname: parsed.hostname || serial,
            model: parsed.model || 'Unknown',
            current_version: parsed.sw_version || 'Unknown',
            target_version: '',
            ip_address: parsed.ip_address || '',
            ha_state: parsed.ha_state || '',
            ha_peer_serial: parsed.ha_peer_serial || '',
            connection_status: parsed.connection_status || '',
            device_group: parsed.device_group || '',
            template: parsed.template || '',
            uptime: parsed.uptime || '',
            region: '',
            site: '',
            stage: 'NOT_STARTED',
            assigned_engineer: '',
            change_record: '',
            change_notes: '',
            approvals: {},
            schedule: null,
            last_sync: now,
            sync_source: source,
            sync_status: 'SYNCED',
            last_seen_panorama: parsed.last_seen || '',
            created_at: now,
            updated_at: now,
            notes: '',
            tags: [],
          };
          await DB.put('devices', newDevice);
          results.new_count++;
        }
      } catch (err) {
        results.errors.push(`Error processing ${parsed.serial||'unknown'}: ${err.message}`);
      }
    }

    // Mark devices not seen in this sync
    for (const [serial, device] of existingMap) {
      if (!seenSerials.has(serial) && device.sync_status !== 'NOT_SEEN_IN_LAST_SYNC') {
        device.sync_status = 'NOT_SEEN_IN_LAST_SYNC';
        device.last_sync = now;
        await DB.put('devices', device);
        results.missing_count++;
      }
    }

    // Record sync history
    await DB.put('sync_history', {
      timestamp: now,
      source, ...results,
      user: Auth.currentUser?.username || 'unknown',
    });

    await AuditLog.log('PANORAMA_SYNC', null, {
      source, new: results.new_count, updated: results.updated_count,
      missing: results.missing_count, errors: results.errors.length, total: results.total,
    });

    return results;
  },

  showSyncResults(results) {
    const el = `
      <div class="space-y-3">
        <div class="grid grid-cols-3 gap-3">
          <div class="bg-green-50 border border-green-200 rounded-lg p-3 text-center">
            <div class="text-2xl font-bold text-green-700">${results.new_count}</div>
            <div class="text-xs text-green-600">New Devices</div>
          </div>
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-center">
            <div class="text-2xl font-bold text-blue-700">${results.updated_count}</div>
            <div class="text-xs text-blue-600">Updated</div>
          </div>
          <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-center">
            <div class="text-2xl font-bold text-yellow-700">${results.missing_count}</div>
            <div class="text-xs text-yellow-600">Not Seen</div>
          </div>
        </div>
        <p class="text-sm text-gray-500">Processed ${results.total} devices from source.</p>
        ${results.errors.length > 0 ? `<details class="text-sm"><summary class="text-red-600 cursor-pointer">${results.errors.length} errors</summary><ul class="mt-1 ml-4 text-red-500 list-disc">${results.errors.map(e => `<li>${esc(e)}</li>`).join('')}</ul></details>` : ''}
      </div>`;
    Modal.show('Sync Results', el, [{ label:'OK', className:'bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm', handler(){} }]);
  },
};

// ============================================================
// FILE SYSTEM ACCESS (JSON SAVE/LOAD + CONFLICT DETECTION)
// ============================================================
const FileSync = {
  fileHandle: null,
  lastWriteId: null,
  customFileHandle: null,

  async promptSave() {
    try {
      if (typeof window.showSaveFilePicker === 'function') {
        await this.saveWithAPI();
      } else {
        await this.saveWithDownload();
      }
    } catch (err) {
      if (err.name !== 'AbortError') Toast.error('Save failed: ' + err.message);
    }
  },

  async saveWithAPI() {
    if (!this.fileHandle) {
      this.fileHandle = await window.showSaveFilePicker({
        suggestedName: 'upgrade_tracker_db.json',
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
      });
    }
    const data = await DB.exportAll();
    this.lastWriteId = data.write_id;
    const writable = await this.fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    document.getElementById('sync-status').innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-green-400 mr-1"></span>Saved ${formatDate(data.exported_at)}`;
    Toast.success('Data saved to file');
    await AuditLog.log('FILE_SAVE', null, { write_id: data.write_id });
  },

  async saveWithDownload() {
    const data = await DB.exportAll();
    this.lastWriteId = data.write_id;
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'upgrade_tracker_db.json'; a.click();
    URL.revokeObjectURL(url);
    Toast.success('Data exported as download');
  },

  async promptLoad() {
    try {
      if (typeof window.showOpenFilePicker === 'function') {
        await this.loadWithAPI();
      } else {
        this.loadWithInput();
      }
    } catch (err) {
      if (err.name !== 'AbortError') Toast.error('Load failed: ' + err.message);
    }
  },

  async loadWithAPI() {
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
    });
    this.fileHandle = handle;
    const file = await handle.getFile();
    const text = await file.text();
    await this.processLoadedData(text);
  },

  loadWithInput() {
    const input = document.getElementById('file-input-json');
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      await this.processLoadedData(text);
      input.value = '';
    };
    input.click();
  },

  async processLoadedData(text) {
    try {
      const data = JSON.parse(text);
      if (!data.version || !data.devices) throw new Error('Invalid data file format');

      // Conflict detection
      if (this.lastWriteId && data.write_id && data.write_id !== this.lastWriteId) {
        Modal.confirm('Conflict Detected',
          `The file was modified by another user since your last save (file write_id: ${data.write_id}, yours: ${this.lastWriteId}). Overwrite local data with file contents?`,
          async () => {
            await DB.importAll(data);
            this.lastWriteId = data.write_id;
            Toast.success(`Loaded: ${data.devices.length} devices`);
            document.getElementById('sync-status').innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-green-400 mr-1"></span>Loaded ${formatDate(data.exported_at)}`;
            Router.handleRoute();
          }
        );
        return;
      }

    `, [

  // Custom save location (File System Access API)
  async setCustomLocation() {
    if (typeof window.showSaveFilePicker !== 'function') {
      Toast.error('Custom save location requires a Chromium-based browser'); return;
    }
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'upgrade_tracker_db.json',
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
      });
      this.customFileHandle = handle;
      try { await DB.put('app_settings', { key: 'file_handle', value: handle }); } catch {}
      await this.autoSave();
      this.updateSavePathUI();
      Toast.success(`Save location set: ${handle.name}`);
    } catch(e) {
      if (e.name !== 'AbortError') Toast.error('Could not set location: ' + e.message);
    }
  },

  async loadCustomLocation() {
    try {
      const stored = await DB.get('app_settings', 'file_handle');
      if (!stored?.value) return;
      const handle = stored.value;
      if (typeof handle.requestPermission !== 'function') return;
      const perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') { this.customFileHandle = handle; this.updateSavePathUI(); }
    } catch {}
  },

  async autoSave() {
    if (!this.customFileHandle) return;
    try {
      const perm = await this.customFileHandle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') return;
      const data = await DB.exportAll();
      this.lastWriteId = data.write_id;
      const writable = await this.customFileHandle.createWritable();
      await writable.write(JSON.stringify(data, null, 2));
      await writable.close();
      this.updateSavePathUI(data.exported_at);
    } catch {}
  },

  getSavedPath() { return this.customFileHandle?.name || null; },

  updateSavePathUI(savedAt) {
    const el = document.getElementById('sync-status');
    if (!el) return;
    const name = this.getSavedPath();
    if (name) {
      const timeStr = savedAt ? ` · Saved ${relTime(savedAt)}` : '';
      el.innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-green-400 mr-1"></span><span class="font-medium">&#128193; ${esc(name)}${timeStr}</span>`;
    }
  },
};

// ============================================================
// URL-BASED PANORAMA SYNC
// ============================================================
const URLSync = {
  intervalId: null,
  lastStatus: null,  // 'ok' | 'error' | null
  lastSyncAt: null,

  async fetchAndSync(url) {
    if (!url) return;
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
      const html = await resp.text();
      const parsed = PanoramaParser.parseHTML(html);
      if (parsed.devices.length === 0) throw new Error('No devices found in response');
      await SyncEngine.sync(parsed.devices, 'url_sync');
      this.lastStatus = 'ok';
      this.lastSyncAt = new Date().toISOString();
      this.updateStatusUI();
      const el = document.getElementById('sync-status');
      if (el && !FileSync.getSavedPath()) {
        el.innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-green-400 mr-1"></span>URL synced ${relTime(this.lastSyncAt)}`;
      }
      if (Router.currentView) Router.handleRoute();
    } catch(e) {
      this.lastStatus = 'error';
      this.lastSyncAt = new Date().toISOString();
      this.updateStatusUI();
      const hint = (e.message.includes('Failed to fetch') || e.message.includes('CORS'))
        ? 'CORS error — server must allow cross-origin requests.'
        : e.message;
      Toast.error('URL Sync failed: ' + hint, 6000);
    }
  },

  start(url, intervalMin) {
    this.stop();
    this.fetchAndSync(url);
    this.intervalId = setInterval(() => this.fetchAndSync(url), (intervalMin || 15) * 60 * 1000);
  },

  stop() {
    if (this.intervalId) { clearInterval(this.intervalId); this.intervalId = null; }
  },

  updateStatusUI() {
    const el = document.getElementById('url-sync-badge');
    if (!el) return;
    if (!this.lastStatus) { el.innerHTML = ''; return; }
    const isOk = this.lastStatus === 'ok';
    const dot = `<span class="inline-block w-2 h-2 rounded-full ${isOk ? 'bg-green-500' : 'bg-red-500'} mr-1"></span>`;
    el.innerHTML = `${dot}<span class="text-xs ${isOk ? 'text-green-700' : 'text-red-700'}">${isOk ? 'Synced' : 'Failed'} ${relTime(this.lastSyncAt)}</span>`;
  },

  async manualSync() {
    const setting = await DB.get('app_settings', 'panorama_url');
    const url = setting?.value;
    if (!url) { Toast.warning('No Panorama URL configured. Set it in Settings.'); return; }
    Toast.info('Syncing from URL...');
    await this.fetchAndSync(url);
  },
};

// ============================================================
// WORKFLOW ENGINE (10-Stage)
// ============================================================
const Workflow = {
  // Preconditions for advancing to each stage
  preconditions: {
    SITE_MANAGER_APPROVAL: (d) => d.region ? true : 'Device must have a region assigned',
    CHANGE_CREATION: (d) => d.approvals?.site_manager === 'approved' ? true : 'Site Manager approval required',
    PEER_REVIEW: (d) => d.change_record ? true : 'Change record number is required',
    PEER_APPROVAL: (d) => true,
    CAP_APPROVAL: (d) => d.approvals?.peer === 'approved' ? true : 'Peer approval required',
    CAB_APPROVAL: (d) => d.approvals?.cap === 'approved' ? true : 'CAP approval required',
    SCHEDULING: (d) => d.approvals?.cab === 'approved' ? true : 'CAB approval required',
    UPGRADE_EXECUTION: (d) => d.schedule ? true : 'Upgrade must be scheduled first',
    VALIDATION: (d) => true,
    CLOSURE: (d) => true,
  },

  // Approval types required at each stage
  approvalStages: {
    SITE_MANAGER_APPROVAL: 'site_manager',
    PEER_APPROVAL: 'peer',
    CAP_APPROVAL: 'cap',
    CAB_APPROVAL: 'cab',
  },

  canAdvance(device, targetStage, isAdmin=false) {
    if (isAdmin) return true; // Admin can skip
    const currentIdx = stageIdx(device.stage);
    const targetIdx = stageIdx(targetStage);
    // Must be sequential (next stage only) for non-admins
    if (targetIdx !== currentIdx + 1) return 'Can only advance to the next stage';
    // Check preconditions
    const check = this.preconditions[targetStage];
    if (check) {
      const result = check(device);
      if (result !== true) return result;
    }
    return true;
  },

  async advanceStage(serial, targetStage, notes='') {
    const device = await DB.get('devices', serial);
    if (!device) throw new Error('Device not found');

    const isAdmin = Auth.isAdmin();
    const check = this.canAdvance(device, targetStage, isAdmin);
    if (check !== true) throw new Error(check);

    const prevStage = device.stage;
    device.stage = targetStage;
    device.updated_at = new Date().toISOString();
    if (notes) device.change_notes = (device.change_notes || '') + `\n[${formatDate(device.updated_at)}] ${notes}`;

    await DB.put('devices', device);
    await AuditLog.log('STAGE_ADVANCE', serial, {
      from: prevStage, to: targetStage, notes,
      admin_override: isAdmin && stageIdx(targetStage) !== stageIdx(prevStage) + 1,
    });
    return device;
  },

  async approve(serial, approvalType, approved, notes='') {
    const device = await DB.get('devices', serial);
    if (!device) throw new Error('Device not found');

    if (!Auth.can('approve', { region: device.region })) {
      throw new Error('You do not have permission to approve for this region');
    }

    if (!device.approvals) device.approvals = {};
    device.approvals[approvalType] = approved ? 'approved' : 'rejected';
    device.approvals[`${approvalType}_by`] = Auth.currentUser.username;
    device.approvals[`${approvalType}_at`] = new Date().toISOString();
    device.approvals[`${approvalType}_notes`] = notes;
    device.updated_at = new Date().toISOString();

    await DB.put('devices', device);
    await AuditLog.log(approved ? 'APPROVE' : 'REJECT', serial, { type: approvalType, notes });
    return device;
  },

  async bulkAdvance(serials, targetStage, notes='') {
    if (!Auth.can('bulk_action')) throw new Error('Bulk actions require Admin role');
    const results = { success: 0, failed: 0, errors: [] };
    for (const serial of serials) {
      try {
        await this.advanceStage(serial, targetStage, notes);
        results.success++;
      } catch (err) {
        results.failed++;
        results.errors.push(`${serial}: ${err.message}`);
      }
    }
    return results;
  },

  async updateDeviceField(serial, field, value) {
    const device = await DB.get('devices', serial);
    if (!device) throw new Error('Device not found');

    // Protected fields check
    const protectedFields = ['serial_number','stage','approvals','created_at'];
    if (protectedFields.includes(field)) throw new Error(`Cannot directly modify ${field}`);

    const oldValue = device[field];
    device[field] = value;
    device.updated_at = new Date().toISOString();
    await DB.put('devices', device);
    await AuditLog.log('EDIT_DEVICE', serial, { field, old: oldValue, new: value });
    FileSync.autoSave().catch(() => {});
    return device;
  },

  async assignEngineer(serial, engineer) {
    return this.updateDeviceField(serial, 'assigned_engineer', engineer);
  },

  async setRegion(serial, region) {
    return this.updateDeviceField(serial, 'region', region);
  },

  async setTargetVersion(serial, version) {
    return this.updateDeviceField(serial, 'target_version', version);
  },

  async setChangeRecord(serial, cr) {
    return this.updateDeviceField(serial, 'change_record', cr);
  },

  // Bulk assign region
  async bulkSetRegion(serials, region) {
    if (!Auth.can('bulk_action')) throw new Error('Admin required');
    for (const s of serials) await this.setRegion(s, region);
  },

  async bulkSetTargetVersion(serials, version) {
    if (!Auth.can('bulk_action')) throw new Error('Admin required');
    for (const s of serials) await this.setTargetVersion(s, version);
  },

  async bulkAssignEngineer(serials, engineer) {
    if (!Auth.can('bulk_action')) throw new Error('Admin required');
    for (const s of serials) await this.assignEngineer(s, engineer);
  },
};

// ============================================================
// SCHEDULE MANAGER
// ============================================================
const ScheduleManager = {
  async getSlots(dateStr, region) {
    const all = await DB.getAll('schedule_slots');
    return all.filter(s => {
      if (dateStr && s.date !== dateStr) return false;
      if (region && region !== 'ALL' && s.region !== region) return false;
      return true;
    });
  },

  async bookSlot(serial, date, timeSlot, region) {
    if (!Auth.can('book_slot', { region })) throw new Error('No permission to book in this region');
    const device = await DB.get('devices', serial);
    if (!device) throw new Error('Device not found');

    // Check max per region/time
    const maxSetting = await DB.get('app_settings', 'max_slots_per_region_time');
    const maxPerSlot = maxSetting?.value || MAX_SLOTS_PER_REGION_TIME;
    const existing = await DB.getAll('schedule_slots');
    const sameSlot = existing.filter(s => s.date === date && s.time_slot === timeSlot && s.region === region && s.status !== 'cancelled');
    if (sameSlot.length >= maxPerSlot) throw new Error(`Maximum ${maxPerSlot} upgrades per time slot per region`);

    // Check device not already scheduled
    const deviceSlots = existing.filter(s => s.device_serial === serial && s.status !== 'cancelled');
    if (deviceSlots.length > 0) throw new Error('Device already has a scheduled slot');

    const slot = {
      id: uid(),
      device_serial: serial,
      hostname: device.hostname,
      date, time_slot: timeSlot, region,
      booked_by: Auth.currentUser.username,
      booked_at: new Date().toISOString(),
      status: 'booked', // booked, locked, cancelled, completed
    };
    await DB.put('schedule_slots', slot);

    device.schedule = { slot_id: slot.id, date, time_slot: timeSlot, region };
    device.updated_at = new Date().toISOString();
    await DB.put('devices', device);
    await AuditLog.log('BOOK_SLOT', serial, { date, time_slot: timeSlot, region });
    return slot;
  },

  async cancelSlot(slotId) {
    const slot = await DB.get('schedule_slots', slotId);
    if (!slot) throw new Error('Slot not found');
    if (slot.status === 'locked') {
      if (!Auth.isAdmin()) throw new Error('Only admin can cancel locked slots');
    }
    if (!Auth.can('cancel_slot', { region: slot.region })) throw new Error('No permission');

    slot.status = 'cancelled';
    slot.cancelled_by = Auth.currentUser.username;
    slot.cancelled_at = new Date().toISOString();
    await DB.put('schedule_slots', slot);

    const device = await DB.get('devices', slot.device_serial);
    if (device) { device.schedule = null; device.updated_at = new Date().toISOString(); await DB.put('devices', device); }
    await AuditLog.log('CANCEL_SLOT', slot.device_serial, { slot_id: slotId, date: slot.date, time_slot: slot.time_slot });
    return slot;
  },

  async lockSlot(slotId) {
    if (!Auth.can('lock_slot')) throw new Error('Only admin can lock slots');
    const slot = await DB.get('schedule_slots', slotId);
    if (!slot) throw new Error('Slot not found');
    slot.status = 'locked';
    slot.locked_by = Auth.currentUser.username;
    slot.locked_at = new Date().toISOString();
    await DB.put('schedule_slots', slot);
    await AuditLog.log('LOCK_SLOT', slot.device_serial, { slot_id: slotId });
    return slot;
  },

  async getDateRange(startDate, days=14) {
    const dates = [];
    for (let i = 0; i < days; i++) {
      dates.push(dayjs(startDate).add(i, 'day').format('YYYY-MM-DD'));
    }
    return dates;
  },

  // Book all unscheduled devices at a site+region into one time slot
  async bookSiteSlot(site, region, date, timeSlot) {
    const allDevices = await DB.getAll('devices');
    const targets = allDevices.filter(d => d.site === site && d.region === region && d.stage === 'SCHEDULING' && !d.schedule);
    const results = { booked: 0, already_scheduled: 0, errors: [] };
    for (const dev of targets) {
      try {
        await this.bookSlot(dev.serial_number, date, timeSlot, region);
        results.booked++;
      } catch(e) {
        if (e.message.includes('already has a scheduled slot')) results.already_scheduled++;
        else results.errors.push(`${dev.hostname}: ${e.message}`);
      }
    }
    return results;
  },
};

  sites: ['NYC','LAX','CHI','DFW','ATL','LON','FRA','AMS','PAR','DUB','SIN','HKG','TYO','SYD','BOM'],

    const chars = '0123456789';
    let s = '';
    for (let i = 0; i < 12; i++) s += chars[Math.floor(Math.random()*chars.length)];
    return s;
  },

  generateIP() {
    return `10.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*254)+1}`;
  },

  async generate(count=100) {
    if (!Auth.isAdmin()) { Toast.error('Admin required'); return; }
    Modal.confirm('Generate Sample Data', `Generate ${count} sample firewall devices? Existing data will be preserved.`, async () => {
      const devices = [];
      const usedSerials = new Set((await DB.getAll('devices')).map(d => d.serial_number));

      for (let i = 0; i < count; i++) {
        let serial;
        do { serial = this.generateSerial(); } while (usedSerials.has(serial));
        usedSerials.add(serial);

        const region = this.regions[Math.floor(Math.random()*this.regions.length)];
        const site = this.sites[Math.floor(Math.random()*this.sites.length)];
        const model = this.models[Math.floor(Math.random()*this.models.length)];
        const version = this.versions[Math.floor(Math.random()*this.versions.length)];
        const hostPrefix = this.hostnames[Math.floor(Math.random()*this.hostnames.length)];
        const hostname = `${hostPrefix}-${site}-${String(i+1).padStart(2,'0')}`;

        const stageRand = Math.random();
        let stage = 'NOT_STARTED';
        if (stageRand > 0.9) stage = 'CLOSURE';
        else if (stageRand > 0.8) stage = 'VALIDATION';
        else if (stageRand > 0.7) stage = 'UPGRADE_EXECUTION';
        else if (stageRand > 0.6) stage = 'SCHEDULING';
        else if (stageRand > 0.5) stage = 'CAB_APPROVAL';
        else if (stageRand > 0.4) stage = 'CAP_APPROVAL';
        else if (stageRand > 0.3) stage = 'PEER_APPROVAL';
        else if (stageRand > 0.2) stage = 'CHANGE_CREATION';
        else if (stageRand > 0.1) stage = 'SITE_MANAGER_APPROVAL';

        const now = new Date().toISOString();
        const approvals = {};
        const stgIdx = stageIdx(stage);
        if (stgIdx >= 2) { approvals.site_manager = 'approved'; approvals.site_manager_by = 'sample_mgr'; approvals.site_manager_at = now; }
        if (stgIdx >= 5) { approvals.peer = 'approved'; approvals.peer_by = 'sample_peer'; approvals.peer_at = now; }
        if (stgIdx >= 6) { approvals.cap = 'approved'; approvals.cap_by = 'sample_cap'; approvals.cap_at = now; }
        if (stgIdx >= 7) { approvals.cab = 'approved'; approvals.cab_by = 'sample_cab'; approvals.cab_at = now; }

        devices.push({
          serial_number: serial, hostname, model,
          current_version: version,
          target_version: stgIdx > 0 ? DEFAULT_TARGET_VERSIONS[0] : '',
          ip_address: this.generateIP(),
          ha_state: haStates[Math.floor(Math.random()*haStates.length)],
          ha_peer_serial: '', connection_status: 'Connected',
          device_group: `DG-${region}-${site}`, template: `TS-${region}`,
          uptime: `${Math.floor(Math.random()*365)}d ${Math.floor(Math.random()*24)}h`,
          region, site, stage,
          assigned_engineer: stgIdx >= 7 ? 'eng_sample' : '',
          change_record: stgIdx >= 3 ? `CHG${String(Math.floor(Math.random()*999999)).padStart(7,'0')}` : '',
          change_notes: '', approvals,
          schedule: null,
          last_sync: now, sync_source: 'sample_generator', sync_status: 'SYNCED',
          last_seen_panorama: now, created_at: now, updated_at: now, notes: '', tags: [],
        });
      }

      await DB.bulkPut('devices', devices);
      await AuditLog.log('GENERATE_SAMPLE_DATA', null, { count });
      Toast.success(`Generated ${count} sample devices`);
      Router.handleRoute();
    });
  },

  assert(condition, name) {

  async runAll() {

    try {
      await this.testDB();
      await this.testParser();
      await this.testWorkflow();
      await this.testRBAC();

    const testDevice = {

      stage: 'NOT_STARTED', region: 'AMER', approvals: {},

    Auth.currentUser = { username: 'test_viewer', role: 'viewer', region: 'AMER' };

    this.assert(!Auth.can('edit_device'), 'RBAC: viewer cannot edit');

    Auth.currentUser = { username: 'test_mgr', role: 'regional_manager', region: 'AMER' };
    this.assert(Auth.can('approve', { region: 'AMER' }), 'RBAC: mgr can approve own region');

    Auth.currentUser = { username: 'test_eng', role: 'engineer', region: 'AMER' };

    this.assert(!Auth.can('update_execution', { device: { assigned_engineer: 'other_eng' } }), 'RBAC: engineer cannot update unassigned');

    // Restore
    Auth.currentUser = origUser;
  },

  async testScheduling() {
    // Create test device in SCHEDULING stage
    const testDev = {
      serial_number: '_TEST_SCHED_001', hostname: 'TEST-SCHED-01', model: 'PA-220',
      stage: 'SCHEDULING', region: 'AMER', approvals: { cap: 'approved', cab: 'approved' },
      current_version: '10.1.9', schedule: null,
      created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
    };
    await DB.put('devices', testDev);

    try {
      const slot = await ScheduleManager.bookSlot('_TEST_SCHED_001', '2099-01-01', '10:00', 'AMER');
      this.assert(slot && slot.id, 'Scheduling: book slot');
      this.assert(slot.status === 'booked', 'Scheduling: slot status is booked');

      const dev = await DB.get('devices', '_TEST_SCHED_001');
      this.assert(dev.schedule && dev.schedule.slot_id === slot.id, 'Scheduling: device linked to slot');

      // Double booking should fail
      let doubleBookFailed = false;
      try { await ScheduleManager.bookSlot('_TEST_SCHED_001', '2099-01-02', '12:00', 'AMER'); }
      catch { doubleBookFailed = true; }
      this.assert(doubleBookFailed, 'Scheduling: double booking prevented');

      // Cancel
      await ScheduleManager.cancelSlot(slot.id);
      const cancelled = await DB.get('schedule_slots', slot.id);
      this.assert(cancelled.status === 'cancelled', 'Scheduling: cancel slot');
    } catch(e) {
      this.results.push({ name: 'Scheduling test error: ' + e.message, pass: false }); this.failed++;
    }

    // Cleanup
    await DB.del('devices', '_TEST_SCHED_001');
    const testSlots = (await DB.getAll('schedule_slots')).filter(s => s.device_serial === '_TEST_SCHED_001');
    for (const s of testSlots) await DB.del('schedule_slots', s.id);
  },

  showResults() {
    const total = this.passed + this.failed;
    const html = `
      <div class="space-y-3">
        <div class="flex gap-4 text-lg font-bold">
          <span class="text-green-600">${this.passed} passed</span>

          <span class="text-gray-500">${total} total</span>
        </div>
        <div class="space-y-1 max-h-96 overflow-auto">
          ${this.results.map(r => `<div class="flex items-center gap-2 text-sm">

          </div>`).join('')}
        </div>

    Modal.show(`Test Results: ${this.passed}/${total}`, html, [
      { label: 'Close', className: 'bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm', handler(){} }
    ]);
    if (this.failed === 0) Toast.success(`All ${total} tests passed!`);
    else Toast.error(`${this.failed} of ${total} tests failed`);
  },
};

// ============================================================
// VIEW RENDERERS
// ============================================================
const Views = {
  // ---------- DASHBOARD ----------
  dashboard: {
    charts: {},
    dashRange: 'all', // 'all' | 'this_week' | 'last_week' | 'this_month'

    setRange(range) { this.dashRange = range; this.render(); },

    filterByRange(items, tsField, range) {
      if (range === 'all') return items;
      const now = dayjs();
      let start, end;
      if (range === 'this_week')  { start = now.startOf('week'); end = now.endOf('week'); }
      else if (range === 'last_week')  { start = now.subtract(1,'week').startOf('week'); end = now.subtract(1,'week').endOf('week'); }
      else if (range === 'this_month') { start = now.startOf('month'); end = now.endOf('month'); }
      else return items;
      return items.filter(item => { const ts = dayjs(item[tsField]); return ts.isAfter(start) && ts.isBefore(end); });
    },

    async render() {
      const el = document.getElementById('view-dashboard');
      const allDevices = await DB.getAll('devices');
      const allSlots = await DB.getAll('schedule_slots');
      const allLogs = await DB.getAll('audit_log');

      if (allDevices.length === 0) {
        el.innerHTML = `<div class="p-6"><div class="bg-white rounded-xl shadow-sm border p-8 text-center">
          <svg class="w-16 h-16 mx-auto text-blue-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          <h2 class="text-xl font-bold text-gray-800 mb-2">Welcome to PAN-OS Upgrade Tracker</h2>
          <p class="text-gray-500 mb-4">Upload a Panorama HTML export to populate your inventory.</p>
          <button onclick="Router.navigate('#inventory')" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm">Go to Inventory</button>
        </div></div>`;
        return;
      }

      // Apply range filter to devices (by updated_at), slots (by date), logs (by timestamp)
      const range = this.dashRange;
      const devices = this.filterByRange(allDevices, 'updated_at', range);
      const slots   = this.filterByRange(allSlots, 'date', range);
      const logs    = this.filterByRange(allLogs, 'timestamp', range);
      const total   = range === 'all' ? allDevices.length : devices.length;

      const completed   = devices.filter(d => d.stage === 'CLOSURE').length;
      const pending     = devices.filter(d => STAGE_MAP[d.stage]?.idx >= 1 && STAGE_MAP[d.stage]?.idx <= 6).length;
      const now         = dayjs();
      const weekEnd     = now.add(7,'day');
      const scheduledThisWeek = allSlots.filter(s => s.status === 'booked' && dayjs(s.date).isAfter(now) && dayjs(s.date).isBefore(weekEnd)).length;
      const inExecution = devices.filter(d => d.stage === 'UPGRADE_EXECUTION').length;

      // Stage distribution
      const stageCounts = {};
      STAGES.forEach(s => stageCounts[s.id] = 0);
      devices.forEach(d => { if (stageCounts[d.stage] !== undefined) stageCounts[d.stage]++; });

      // Version distribution
      const versionCounts = {};
      devices.forEach(d => { const v = d.current_version || 'Unknown'; versionCounts[v] = (versionCounts[v]||0) + 1; });

      // Region x Stage matrix for stacked bar
      const regions = [...new Set(allDevices.map(d => d.region || 'Unassigned'))].sort();
      const regionStageData = {};
      regions.forEach(r => { regionStageData[r] = {}; STAGES.forEach(s => regionStageData[r][s.id] = 0); });
      devices.forEach(d => { const r = d.region || 'Unassigned'; if (regionStageData[r]) regionStageData[r][d.stage]++; });

      // Weekly completion trend (last 8 weeks) — always from ALL logs, not filtered
      const weekBuckets = Array(8).fill(null).map((_,i) => ({
        label: dayjs().subtract(7-i,'week').startOf('week').format('MMM D'),
        start: dayjs().subtract(7-i,'week').startOf('week'),
        end:   dayjs().subtract(7-i,'week').endOf('week'),
        count: 0,
      }));
      allLogs.forEach(l => {
        if (l.action === 'STAGE_ADVANCE' && l.details?.to === 'CLOSURE') {
          const ts = dayjs(l.timestamp);
          const bucket = weekBuckets.find(b => ts.isAfter(b.start) && ts.isBefore(b.end));
          if (bucket) bucket.count++;
        }
      });

      // Range selector labels
      const rangeLabels = { all:'All Time', this_week:'This Week', last_week:'Last Week', this_month:'This Month' };
      const rangeSelector = Object.entries(rangeLabels).map(([r,label]) =>
        `<button onclick="Views.dashboard.setRange('${r}')" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${this.dashRange===r ? 'bg-blue-600 text-white' : 'bg-white border hover:bg-gray-50 text-gray-600'}">${label}</button>`
      ).join('');

      const totalLabel = range === 'all' ? 'Total Firewalls' : 'Active (Range)';

      el.innerHTML = `<div class="p-6 space-y-6">
        <!-- Time Range Selector -->
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-xs text-gray-500 font-medium">Range:</span>
          ${rangeSelector}
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
          <div class="bg-white rounded-xl border p-4"><div class="text-2xl font-bold text-gray-800">${total}</div><div class="text-xs text-gray-500">${totalLabel}</div></div>
          <div class="bg-white rounded-xl border p-4"><div class="text-2xl font-bold text-green-600">${completed}</div><div class="text-xs text-gray-500">Completed</div></div>
          <div class="bg-white rounded-xl border p-4"><div class="text-2xl font-bold text-yellow-600">${pending}</div><div class="text-xs text-gray-500">Pending Approvals</div></div>
          <div class="bg-white rounded-xl border p-4"><div class="text-2xl font-bold text-blue-600">${scheduledThisWeek}</div><div class="text-xs text-gray-500">Scheduled Next 7d</div></div>
          <div class="bg-white rounded-xl border p-4"><div class="text-2xl font-bold text-purple-600">${inExecution}</div><div class="text-xs text-gray-500">In Execution</div></div>
        </div>

        <!-- Charts Row 1 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white rounded-xl border p-4"><h3 class="text-sm font-semibold mb-3">Stage Distribution</h3><div style="height:220px"><canvas id="chart-stage"></canvas></div></div>
          <div class="bg-white rounded-xl border p-4"><h3 class="text-sm font-semibold mb-3">Region Progress</h3><div style="height:220px"><canvas id="chart-region"></canvas></div></div>
          <div class="bg-white rounded-xl border p-4"><h3 class="text-sm font-semibold mb-3">Version Distribution</h3><div style="height:220px"><canvas id="chart-version"></canvas></div></div>
        </div>

        <!-- Weekly Completion Trend (always shown) -->
        <div class="bg-white rounded-xl border p-4">
          <h3 class="text-sm font-semibold mb-3">Weekly Completion Trend <span class="text-xs text-gray-400 font-normal">(last 8 weeks — all time)</span></h3>
          <div style="height:160px"><canvas id="chart-weekly"></canvas></div>
        </div>

        <!-- Tables Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="bg-white rounded-xl border p-4">
            <h3 class="text-sm font-semibold mb-3">Upcoming Upgrades</h3>
            <div class="overflow-auto max-h-48" id="dash-upcoming"></div>
          </div>
          <div class="bg-white rounded-xl border p-4">
            <h3 class="text-sm font-semibold mb-3">Recent Activity</h3>
            <div class="overflow-auto max-h-48" id="dash-activity"></div>
          </div>
        </div>
      </div>`;

      // Render charts
      this.renderCharts(stageCounts, regions, regionStageData, versionCounts, weekBuckets);

      // Upcoming upgrades table (always from allSlots, future-facing)
      const upcoming = allSlots.filter(s => s.status === 'booked' && dayjs(s.date).isAfter(dayjs().subtract(1,'day'))).sort((a,b) => a.date.localeCompare(b.date)).slice(0,8);
      document.getElementById('dash-upcoming').innerHTML = upcoming.length === 0
        ? '<p class="text-gray-400 text-sm">No upcoming upgrades</p>'
        : `<table class="w-full text-xs"><thead><tr class="text-left text-gray-500"><th class="pb-1">Device</th><th class="pb-1">Date</th><th class="pb-1">Time</th><th class="pb-1">Region</th></tr></thead><tbody>${upcoming.map(s =>
          `<tr class="border-t"><td class="py-1">${esc(s.hostname)}</td><td class="py-1">${s.date}</td><td class="py-1">${s.time_slot}</td><td class="py-1">${s.region}</td></tr>`
        ).join('')}</tbody></table>`;

      // Recent activity (respects range filter)
      const recent = logs.slice(-10).reverse();
      document.getElementById('dash-activity').innerHTML = recent.length === 0
        ? '<p class="text-gray-400 text-sm">No activity in this range</p>'
        : `<div class="space-y-1">${recent.map(l =>
          `<div class="flex items-center gap-2 text-xs border-b pb-1"><span class="text-gray-400 w-28 flex-shrink-0">${relTime(l.timestamp)}</span><span class="font-medium">${esc(l.user)}</span><span class="text-gray-500">${esc(l.action)}</span></div>`
        ).join('')}</div>`;
    },

    renderCharts(stageCounts, regions, regionStageData, versionCounts, weekBuckets) {
      if (typeof Chart === 'undefined') return;
      // Destroy old charts
      Object.values(this.charts).forEach(c => c.destroy());
      this.charts = {};

      // Stage donut
      const stageCanvas = document.getElementById('chart-stage');
      if (stageCanvas) {
        this.charts.stage = new Chart(stageCanvas, {
          type: 'doughnut',
          data: {
            labels: STAGES.map(s => s.label),
            datasets: [{ data: STAGES.map(s => stageCounts[s.id]||0), backgroundColor: STAGES.map(s => s.color) }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 9 } } } } }
        });
      }

      // Region stacked bar
      const regionCanvas = document.getElementById('chart-region');
      if (regionCanvas) {
        const datasets = STAGES.map(s => ({
          label: s.label, backgroundColor: s.color,
          data: regions.map(r => regionStageData[r]?.[s.id] || 0),
        }));
        this.charts.region = new Chart(regionCanvas, {
          type: 'bar',
          data: { labels: regions, datasets },
          options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } },
            plugins: { legend: { display: false } } }
        });
      }

      // Version pie
      const versionCanvas = document.getElementById('chart-version');
      if (versionCanvas) {
        const vLabels = Object.keys(versionCounts).sort();
        const vColors = ['#3b82f6','#ef4444','#f59e0b','#10b981','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];
        this.charts.version = new Chart(versionCanvas, {
          type: 'pie',
          data: { labels: vLabels, datasets: [{ data: vLabels.map(v => versionCounts[v]), backgroundColor: vColors.slice(0, vLabels.length) }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 9 } } } } }
        });
      }

      // Weekly completion trend bar chart
      const weeklyCanvas = document.getElementById('chart-weekly');
      if (weeklyCanvas && weekBuckets) {
        this.charts.weekly = new Chart(weeklyCanvas, {
          type: 'bar',
          data: {
            labels: weekBuckets.map(b => b.label),
            datasets: [{ label: 'Completed (CLOSURE)', data: weekBuckets.map(b => b.count), backgroundColor: '#16a34a', borderRadius: 4 }],
          },
          options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
        });
      }
    },
  },

  // ---------- INVENTORY ----------
  inventory: {
    async render() {

      InvState.devices = await DB.getAll('devices');

          <div class="flex items-center gap-2 flex-wrap">
            <input type="text" id="inv-search" class="border rounded-lg px-3 py-1.5 text-sm w-64" placeholder="Search hostname, serial, IP..." value="${esc(InvState.filters.search)}" oninput="Views.inventory.onFilterChange()">
            <select id="inv-filter-region" class="border rounded-lg px-3 py-1.5 text-sm" onchange="Views.inventory.onFilterChange()">

            </select>
            <select id="inv-filter-model" class="border rounded-lg px-3 py-1.5 text-sm" onchange="Views.inventory.onFilterChange()">
              <option value="">All Models</option>${models.map(m => `<option value="${m}" ${InvState.filters.model===m?'selected':''}>${m}</option>`).join('')}
            </select>
            <select id="inv-filter-sync" class="border rounded-lg px-3 py-1.5 text-sm" onchange="Views.inventory.onFilterChange()">
              <option value="">All Sync Status</option>
              <option value="SYNCED" ${InvState.filters.sync_status==='SYNCED'?'selected':''}>Synced</option>
              <option value="NOT_SEEN_IN_LAST_SYNC" ${InvState.filters.sync_status==='NOT_SEEN_IN_LAST_SYNC'?'selected':''}>Not Seen</option>
            </select>
            <div class="flex-1"></div>
            ${Auth.can('sync_panorama') ? `<button onclick="FileSync.uploadPanorama()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-sm">Upload Panorama</button>
            <button onclick="FileSync.pasteSync()" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1.5 rounded-lg text-sm">Paste Data</button>` : ''}
            <button onclick="Views.inventory.exportCSV()" class="bg-gray-200 hover:bg-gray-300 px-3 py-1.5 rounded-lg text-sm">Export CSV</button>
          </div>
          <!-- Bulk Actions Bar -->
          <div id="inv-bulk-bar" class="hidden flex items-center gap-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2">
            <span class="text-sm font-medium text-blue-800" id="inv-selected-count">0 selected</span>
            <div class="flex-1"></div>
            ${Auth.can('bulk_action') ? `
            <select id="inv-bulk-region" class="border rounded px-2 py-1 text-xs"><option value="">Set Region...</option>${regions.map(r=>`<option value="${r}">${r}</option>`).join('')}</select>
            <button onclick="Views.inventory.bulkSetRegion()" class="bg-blue-600 text-white px-2 py-1 rounded text-xs">Apply</button>
            <select id="inv-bulk-stage" class="border rounded px-2 py-1 text-xs"><option value="">Move to Stage...</option>${STAGES.map(s=>`<option value="${s.id}">${s.label}</option>`).join('')}</select>
            <button onclick="Views.inventory.bulkAdvanceStage()" class="bg-blue-600 text-white px-2 py-1 rounded text-xs">Apply</button>
            ` : ''}
            <button onclick="Views.inventory.clearSelection()" class="text-gray-500 hover:text-gray-700 text-xs">Clear</button>
          </div>
        </div>
        <!-- Table -->
        <div class="flex-1 overflow-auto p-4">
          <table class="w-full text-sm inv-table bg-white rounded-lg border">
            <thead><tr class="text-left text-xs text-gray-500 uppercase border-b">
              <th class="px-3 py-2 w-8"><input type="checkbox" id="inv-select-all" onchange="Views.inventory.toggleSelectAll(this.checked)"></th>
              <th class="px-3 py-2 cursor-pointer hover:text-gray-800" onclick="Views.inventory.toggleSort('hostname')">Hostname ${this.sortIcon('hostname')}</th>
              <th class="px-3 py-2 cursor-pointer hover:text-gray-800" onclick="Views.inventory.toggleSort('serial_number')">Serial ${this.sortIcon('serial_number')}</th>
              <th class="px-3 py-2 cursor-pointer hover:text-gray-800" onclick="Views.inventory.toggleSort('model')">Model ${this.sortIcon('model')}</th>
              <th class="px-3 py-2 cursor-pointer hover:text-gray-800" onclick="Views.inventory.toggleSort('current_version')">Version ${this.sortIcon('current_version')}</th>
              <th class="px-3 py-2 cursor-pointer hover:text-gray-800" onclick="Views.inventory.toggleSort('region')">Region ${this.sortIcon('region')}</th>
              <th class="px-3 py-2 cursor-pointer hover:text-gray-800" onclick="Views.inventory.toggleSort('stage')">Stage ${this.sortIcon('stage')}</th>
              <th class="px-3 py-2">HA</th>
              <th class="px-3 py-2">Sync</th>
              <th class="px-3 py-2 w-16">Actions</th>
            </tr></thead>
            <tbody id="inv-table-body"></tbody>
          </table>
          <!-- Pagination -->
          <div class="flex items-center justify-between mt-3 text-sm text-gray-500">
            <span id="inv-showing">Showing 0 of 0</span>
            <div class="flex gap-1" id="inv-pagination"></div>
          </div>
        </div>
      </div>`;
      this.renderTableBody();
    },

    onFilterChange: debounce(function() {
      InvState.filters.search = document.getElementById('inv-search')?.value || '';
      InvState.filters.region = document.getElementById('inv-filter-region')?.value || '';
      InvState.filters.stage = document.getElementById('inv-filter-stage')?.value || '';
      InvState.filters.model = document.getElementById('inv-filter-model')?.value || '';
      InvState.filters.sync_status = document.getElementById('inv-filter-sync')?.value || '';
      InvState.page = 1;
      Views.inventory.applyFilters();
      Views.inventory.renderTableBody();
    }, 200),

    applyFilters() {
      let f = [...InvState.devices];
      const { search, region, stage, model, sync_status } = InvState.filters;
      if (search) {
        const q = search.toLowerCase();
        f = f.filter(d => (d.hostname||'').toLowerCase().includes(q) || (d.serial_number||'').toLowerCase().includes(q) || (d.ip_address||'').toLowerCase().includes(q) || (d.change_record||'').toLowerCase().includes(q));
      }
      if (region === '__unassigned') f = f.filter(d => !d.region);
      else if (region) f = f.filter(d => d.region === region);
      if (stage) f = f.filter(d => d.stage === stage);
      if (model) f = f.filter(d => d.model === model);
      if (sync_status) f = f.filter(d => d.sync_status === sync_status);

      // Sort
      const { field, dir } = InvState.sort;
      f.sort((a,b) => {
        let va = a[field]||'', vb = b[field]||'';
        if (field === 'stage') { va = stageIdx(va); vb = stageIdx(vb); }
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return dir==='asc' ? -1 : 1;
        if (va > vb) return dir==='asc' ? 1 : -1;
        return 0;
      });
      InvState.filtered = f;
    },

    renderTableBody() {
      const { filtered, page, perPage, selected } = InvState;
      const start = (page-1)*perPage;
      const pageDevices = filtered.slice(start, start+perPage);
      const tbody = document.getElementById('inv-table-body');
      if (!tbody) return;

      tbody.innerHTML = pageDevices.map(d => {
        const checked = selected.has(d.serial_number) ? 'checked' : '';
        const syncDot = d.sync_status === 'NOT_SEEN_IN_LAST_SYNC'
          ? '<span class="inline-block w-2 h-2 rounded-full bg-yellow-400" title="Not seen in last sync"></span>'
          : '<span class="inline-block w-2 h-2 rounded-full bg-green-400" title="Synced"></span>';
        const cs = (d.connection_status || '').toLowerCase();
        const connDot = cs.includes('yes') || cs.includes('connect')
          ? '<span class="inline-block w-2 h-2 rounded-full bg-green-500 ml-1" title="Connected"></span>'
          : cs.includes('no') || cs.includes('disconnect')
            ? '<span class="inline-block w-2 h-2 rounded-full bg-red-500 ml-1" title="Disconnected"></span>'
            : '<span class="inline-block w-2 h-2 rounded-full bg-yellow-400 ml-1" title="Connection unknown"></span>';
        const syncBadge = syncDot + connDot;
        const stgColor = stageColor(d.stage);
        return `<tr class="border-b hover:bg-blue-50/50 cursor-pointer" onclick="if(!event.target.closest('input,button'))Router.navigate('#device-detail/${d.serial_number}')">
          <td class="px-3 py-2"><input type="checkbox" ${checked} onchange="Views.inventory.toggleSelect('${d.serial_number}',this.checked)" onclick="event.stopPropagation()"></td>
          <td class="px-3 py-2 font-medium">${esc(d.hostname)}</td>
          <td class="px-3 py-2 text-gray-500 text-xs">${esc(d.serial_number)}</td>
          <td class="px-3 py-2">${esc(d.model)}</td>
          <td class="px-3 py-2 text-xs">${esc(d.current_version)}</td>
          <td class="px-3 py-2">${d.region ? `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs">${esc(d.region)}</span>` : '<span class="text-gray-300 text-xs">-</span>'}</td>
          <td class="px-3 py-2"><span class="px-2 py-0.5 rounded text-xs text-white" style="background:${stgColor}">${stageLabel(d.stage)}</span></td>
          <td class="px-3 py-2 text-xs text-gray-500">${esc(d.ha_state||'-')}</td>
          <td class="px-3 py-2">${syncBadge}</td>
          <td class="px-3 py-2"><button class="text-blue-600 hover:text-blue-800 text-xs" onclick="event.stopPropagation();Router.navigate('#device-detail/${d.serial_number}')">View</button></td>
        </tr>`;
      }).join('');

      // Update showing text
      const showingEl = document.getElementById('inv-showing');
      if (showingEl) showingEl.textContent = `Showing ${start+1}-${Math.min(start+perPage,filtered.length)} of ${filtered.length} (${InvState.devices.length} total)`;

      // Pagination
      const totalPages = Math.ceil(filtered.length / perPage);
      const pagEl = document.getElementById('inv-pagination');
      if (pagEl && totalPages > 1) {
        let html = '';
        if (page > 1) html += `<button onclick="Views.inventory.goPage(${page-1})" class="px-2 py-1 rounded border text-xs hover:bg-gray-100">&laquo;</button>`;
        for (let p = Math.max(1,page-3); p <= Math.min(totalPages,page+3); p++) {
          html += `<button onclick="Views.inventory.goPage(${p})" class="px-2 py-1 rounded border text-xs ${p===page?'bg-blue-600 text-white':'hover:bg-gray-100'}">${p}</button>`;
        }
        if (page < totalPages) html += `<button onclick="Views.inventory.goPage(${page+1})" class="px-2 py-1 rounded border text-xs hover:bg-gray-100">&raquo;</button>`;
        pagEl.innerHTML = html;
      }
    },

    toggleSort(field) {
      if (InvState.sort.field === field) InvState.sort.dir = InvState.sort.dir === 'asc' ? 'desc' : 'asc';
      else { InvState.sort.field = field; InvState.sort.dir = 'asc'; }
      this.applyFilters();
      this.renderTableBody();
    },

    sortIcon(field) {
      if (InvState.sort.field !== field) return '';
      return InvState.sort.dir === 'asc' ? ' &#9650;' : ' &#9660;';
    },

    toggleSelect(serial, checked) {
      if (checked) InvState.selected.add(serial); else InvState.selected.delete(serial);
      this.updateBulkBar();
    },

    toggleSelectAll(checked) {
      const { filtered, page, perPage } = InvState;
      const start = (page-1)*perPage;
      const pageDevices = filtered.slice(start, start+perPage);
      pageDevices.forEach(d => { if (checked) InvState.selected.add(d.serial_number); else InvState.selected.delete(d.serial_number); });
      this.renderTableBody();
      this.updateBulkBar();
    },

    clearSelection() { InvState.selected.clear(); this.renderTableBody(); this.updateBulkBar(); },

    updateBulkBar() {
      const bar = document.getElementById('inv-bulk-bar');
      const countEl = document.getElementById('inv-selected-count');
      if (InvState.selected.size > 0) { bar?.classList.remove('hidden'); if(countEl) countEl.textContent = InvState.selected.size + ' selected'; }
      else bar?.classList.add('hidden');
    },

    goPage(p) { InvState.page = p; this.renderTableBody(); },

    async bulkSetRegion() {
      const region = document.getElementById('inv-bulk-region')?.value;
      if (!region) { Toast.warning('Select a region'); return; }
      try {
        await Workflow.bulkSetRegion([...InvState.selected], region);
        Toast.success(`Set ${InvState.selected.size} devices to ${region}`);
        InvState.selected.clear();
        await this.render();
      } catch(e) { Toast.error(e.message); }
    },

    async bulkAdvanceStage() {
      const stage = document.getElementById('inv-bulk-stage')?.value;
      if (!stage) { Toast.warning('Select a stage'); return; }
      const results = await Workflow.bulkAdvance([...InvState.selected], stage);
      Toast.success(`Moved ${results.success} devices. ${results.failed} failed.`);
      if (results.errors.length > 0) Toast.warning(results.errors.slice(0,3).join('; '));
      InvState.selected.clear();
      await this.render();
    },

    exportCSV() {
      const data = InvState.filtered.length > 0 ? InvState.filtered : InvState.devices;
      ExportConfig.showModal(data, `inventory_${dayjs().format('YYYYMMDD')}.csv`);
    },
  },

        <div class="flex items-center gap-3">
          <button onclick="Router.navigate('#inventory')" class="text-gray-400 hover:text-gray-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>

            <h2 class="text-xl font-bold">${esc(device.hostname)}</h2>

                  <option value="">Select version...</option>${versions.map(v=>`<option value="${v}" ${device.target_version===v?'selected':''}>${v}</option>`).join('')}
                </select></div>

                  <option value="">Select engineer...</option>${users.map(u=>`<option value="${u.username}" ${device.assigned_engineer===u.username?'selected':''}>${u.username} (${u.role})</option>`).join('')}
