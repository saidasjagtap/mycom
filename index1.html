              ? `<button onclick="WorkflowUI.showAdvanceDialog('${serial}','${device.stage}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-sm">Advance Stage</button>` : ''}

              <div class="grid grid-cols-2 gap-2 text-sm">
                <div><span class="text-gray-500">Date:</span> ${activeSlot.date}</div>
                <div><span class="text-gray-500">Time:</span> ${activeSlot.time_slot}</div>
                <div><span class="text-gray-500">Region:</span> ${activeSlot.region}</div>
                <div><span class="text-gray-500">Status:</span> <span class="font-medium">${activeSlot.status}</span></div>
                <div><span class="text-gray-500">Booked by:</span> ${esc(activeSlot.booked_by)}</div>
                <div><span class="text-gray-500">Booked at:</span> ${relTime(activeSlot.booked_at)}</div>
              </div>
              ${Auth.can('cancel_slot', { region: activeSlot.region }) ? `<button onclick="ScheduleManager.cancelSlot('${activeSlot.id}').then(()=>{Toast.success('Slot cancelled');Views['device-detail'].render(['${serial}'])}).catch(e=>Toast.error(e.message))" class="mt-3 bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-sm">Cancel Slot</button>` : ''}
              ${Auth.can('lock_slot') && activeSlot.status === 'booked' ? `<button onclick="ScheduleManager.lockSlot('${activeSlot.id}').then(()=>{Toast.success('Slot locked');Views['device-detail'].render(['${serial}'])}).catch(e=>Toast.error(e.message))" class="mt-3 ml-2 bg-yellow-600 hover:bg-yellow-700 text-white px-3 py-1 rounded text-sm">Lock Slot</button>` : ''}
            </div>
          ` : `<p class="text-gray-400 text-sm">No schedule yet. ${Auth.can('book_slot', { region: device.region }) ? '<a href="#scheduling" class="text-blue-600 hover:underline">Go to Scheduling</a>' : ''}</p>`}
        </div>`;
      }

      else if (this.currentTab === 'audit') {
        const logs = (await DB.getAll('audit_log')).filter(l => l.device_serial === serial).reverse().slice(0, 50);
        tc.innerHTML = `<div class="bg-white rounded-lg border p-4">
          <h4 class="font-semibold mb-3">Audit Log (${logs.length} entries)</h4>
          ${logs.length === 0 ? '<p class="text-gray-400 text-sm">No audit entries for this device</p>' :
          `<table class="w-full text-xs"><thead><tr class="text-left text-gray-500 border-b"><th class="pb-1">Time</th><th class="pb-1">User</th><th class="pb-1">Action</th><th class="pb-1">Details</th></tr></thead>
          <tbody>${logs.map(l => `<tr class="border-b"><td class="py-1 text-gray-400">${formatDate(l.timestamp)}</td><td class="py-1">${esc(l.user)}</td><td class="py-1 font-medium">${esc(l.action)}</td><td class="py-1 text-gray-500">${esc(JSON.stringify(l.details||{}).substring(0,80))}</td></tr>`).join('')}</tbody></table>`}

  // ---------- SCHEDULING (movie-ticket grid) ----------
  scheduling: {
    selectedRegion: 'ALL',
    startDate: null,
    schedMode: 'device', // 'device' | 'site'
    _siteDevices: [],

    async render() {
      const el = document.getElementById('view-scheduling');
      if (!this.startDate) this.startDate = dayjs().format('YYYY-MM-DD');
      const regionsSetting = await DB.get('app_settings','regions');
      const regions = regionsSetting?.value || DEFAULT_REGIONS;
      const slotsSetting = await DB.get('app_settings','time_slots');
      const timeSlots = slotsSetting?.value || DEFAULT_TIME_SLOTS;
      const maxSetting = await DB.get('app_settings','max_slots_per_region_time');
      const maxPerSlot = maxSetting?.value || MAX_SLOTS_PER_REGION_TIME;

      const dates = await ScheduleManager.getDateRange(this.startDate, 14);
      const allSlots = await ScheduleManager.getSlots();
      const allDevices = await DB.getAll('devices');
      this._siteDevices = allDevices;
      const unscheduledDevices = allDevices.filter(d => d.stage === 'SCHEDULING' && !d.schedule);
      const deviceSiteMap = new Map(allDevices.map(d => [d.serial_number, d.site || '']));

      const modeBtnCls = (m) => this.schedMode === m
        ? 'bg-blue-600 text-white px-3 py-1 rounded text-xs font-medium'
        : 'bg-white border text-gray-600 hover:bg-gray-50 px-3 py-1 rounded text-xs';

      el.innerHTML = `<div class="p-4 space-y-4">
        <div class="flex items-center gap-3 flex-wrap">
          <select id="sched-region" class="border rounded-lg px-3 py-1.5 text-sm" onchange="Views.scheduling.selectedRegion=this.value;Views.scheduling.render()">
            <option value="ALL" ${this.selectedRegion==='ALL'?'selected':''}>All Regions</option>
            ${regions.map(r => `<option value="${r}" ${this.selectedRegion===r?'selected':''}>${r}</option>`).join('')}
          </select>
          <button onclick="Views.scheduling.prevWeek()" class="border rounded px-2 py-1 text-sm hover:bg-gray-100">&laquo; Prev</button>
          <input type="date" id="sched-start" class="border rounded px-2 py-1 text-sm" value="${this.startDate}" onchange="Views.scheduling.startDate=this.value;Views.scheduling.render()">
          <button onclick="Views.scheduling.nextWeek()" class="border rounded px-2 py-1 text-sm hover:bg-gray-100">Next &raquo;</button>
          <span class="text-xs text-gray-500">Max ${maxPerSlot} per slot/region</span>
          <div class="flex-1"></div>
          <!-- Mode toggle -->
          <div class="flex gap-1 border rounded-lg p-0.5 bg-gray-100">
            <button onclick="Views.scheduling.schedMode='device';Views.scheduling.render()" class="${modeBtnCls('device')}">By Device</button>
            <button onclick="Views.scheduling.schedMode='site';Views.scheduling.render()" class="${modeBtnCls('site')}">By Site</button>
          </div>
          <span class="text-sm text-gray-600">${unscheduledDevices.length} awaiting scheduling</span>
        </div>

        <!-- Grid -->
        <div class="overflow-auto bg-white rounded-lg border">
          <table class="text-xs">
            <thead><tr>
              <th class="sticky left-0 bg-gray-50 px-3 py-2 border-r text-left min-w-[90px]">Date</th>
              ${timeSlots.map(t => `<th class="px-2 py-2 text-center border-r min-w-[80px]">${t}</th>`).join('')}
            </tr></thead>
            <tbody id="sched-grid-body"></tbody>
          </table>
        </div>

        <!-- Legend -->
        <div class="flex gap-4 text-xs text-gray-500">
          <span><span class="inline-block w-3 h-3 bg-green-100 border border-green-300 rounded mr-1"></span>Available</span>
          <span><span class="inline-block w-3 h-3 bg-yellow-100 border border-yellow-300 rounded mr-1"></span>Booked</span>
          <span><span class="inline-block w-3 h-3 bg-emerald-100 border border-emerald-300 rounded mr-1"></span>My Booking</span>
          <span><span class="inline-block w-3 h-3 bg-red-100 border border-red-300 rounded mr-1"></span>Locked/Full</span>
          ${this.schedMode === 'site' ? '<span class="text-blue-500 font-medium">Site mode: click cell to book all devices at a site</span>' : ''}
        </div>
      </div>`;

      // Render grid
      const tbody = document.getElementById('sched-grid-body');
      if (!tbody) return;
      const isSiteMode = this.schedMode === 'site';

      tbody.innerHTML = dates.map(date => {
        const isWeekend = [0,6].includes(dayjs(date).day());
        const rowClass = isWeekend ? 'bg-gray-50' : '';
        return `<tr class="${rowClass} border-t">
          <td class="sticky left-0 bg-gray-50 px-3 py-2 border-r font-medium">${dayjs(date).format('ddd, MMM D')}</td>
          ${timeSlots.map(ts => {
            const slotMatches = allSlots.filter(s => s.date === date && s.time_slot === ts && s.status !== 'cancelled' && (this.selectedRegion === 'ALL' || s.region === this.selectedRegion));
            const count = slotMatches.length;
            const isFull = count >= maxPerSlot;
            const hasLocked = slotMatches.some(s => s.status === 'locked');
            const isMine = slotMatches.some(s => s.booked_by === Auth.currentUser?.username);

            let bg = 'bg-green-50 hover:bg-green-100';
            if (count > 0 && isMine) bg = 'bg-emerald-50';
            else if (isFull || hasLocked) bg = 'bg-red-50';
            else if (count > 0) bg = 'bg-yellow-50';

            let cellContent;
            if (isSiteMode) {
              // Group booked slots by site
              const siteCounts = {};
              slotMatches.forEach(s => {
                const site = deviceSiteMap.get(s.device_serial) || 'Unknown';
                siteCounts[site] = (siteCounts[site] || 0) + 1;
              });
              cellContent = Object.entries(siteCounts).map(([site, cnt]) =>
                `<div class="truncate" title="${esc(site)}">${esc(site)} (${cnt})</div>`
              ).join('');
            } else {
              cellContent = slotMatches.map(s => `<div class="truncate" title="${esc(s.hostname)}">${esc(s.hostname?.substring(0,12)||s.device_serial.substring(0,8))}</div>`).join('');
            }

            const canBook = Auth.can('book_slot') && !isFull && !hasLocked;
            const clickFn = canBook
              ? (isSiteMode ? `Views.scheduling.showBookSiteDialog('${date}','${ts}')` : `Views.scheduling.showBookDialog('${date}','${ts}')`)
              : '';

            return `<td class="px-1 py-1 border-r ${bg} ${canBook?'slot-available':''} text-[10px]" ${clickFn ? `onclick="${clickFn}"` : ''}>
              ${cellContent || (canBook ? '<span class="text-gray-300">+</span>' : '')}
              ${count > 0 ? `<div class="text-gray-400">${count}/${maxPerSlot}</div>` : ''}
            </td>`;
          }).join('')}
        </tr>`;
      }).join('');
    },

    prevWeek() { this.startDate = dayjs(this.startDate).subtract(7,'day').format('YYYY-MM-DD'); this.render(); },
    nextWeek() { this.startDate = dayjs(this.startDate).add(7,'day').format('YYYY-MM-DD'); this.render(); },

    async showBookDialog(date, timeSlot) {
      const devices = (await DB.getAll('devices')).filter(d => d.stage === 'SCHEDULING' && !d.schedule);
      if (devices.length === 0) { Toast.warning('No devices in SCHEDULING stage'); return; }
      const regionsSetting = await DB.get('app_settings','regions');
      const regions = regionsSetting?.value || DEFAULT_REGIONS;

      Modal.show('Book Upgrade Slot', `
        <div class="space-y-3">
          <p class="text-sm">Date: <strong>${date}</strong> Time: <strong>${timeSlot}</strong></p>
          <div><label class="text-sm font-medium">Device:</label>
            <select id="book-device" class="w-full border rounded p-2 text-sm mt-1">
              ${devices.map(d => `<option value="${d.serial_number}">${esc(d.hostname)} (${esc(d.serial_number)}) - ${esc(d.region||'No region')}</option>`).join('')}
            </select></div>
          <div><label class="text-sm font-medium">Region:</label>
            <select id="book-region" class="w-full border rounded p-2 text-sm mt-1">
              ${regions.map(r => `<option value="${r}">${r}</option>`).join('')}
            </select></div>
        </div>
      `, [
        { label: 'Cancel', handler(){} },
        { label: 'Book Slot', className: 'bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium', handler: async () => {
          const serial = document.getElementById('book-device').value;
          const region = document.getElementById('book-region').value;
          try {
            await ScheduleManager.bookSlot(serial, date, timeSlot, region);
            Toast.success('Slot booked!');
            this.render();
          } catch(e) { Toast.error(e.message); }
        }},
      ]);
    },

    async showBookSiteDialog(date, timeSlot) {
      const unscheduled = this._siteDevices.filter(d => d.stage === 'SCHEDULING' && !d.schedule);
      if (unscheduled.length === 0) { Toast.warning('No devices in SCHEDULING stage'); return; }
      const regionsSetting = await DB.get('app_settings','regions');
      const regions = regionsSetting?.value || DEFAULT_REGIONS;
      const sites = [...new Set(unscheduled.map(d => d.site).filter(Boolean))].sort();
      if (sites.length === 0) { Toast.warning('No site data found. Assign sites to devices first.'); return; }

      Modal.show('Book Site Slot', `
        <div class="space-y-3">
          <p class="text-sm">Date: <strong>${date}</strong> Time: <strong>${timeSlot}</strong></p>
          <p class="text-xs text-gray-500">Books all unscheduled devices at the selected site + region into this slot.</p>
          <div><label class="text-sm font-medium">Site:</label>
            <select id="book-site-site" class="w-full border rounded p-2 text-sm mt-1" onchange="Views.scheduling._updateSitePreview()">
              <option value="">Select site...</option>
              ${sites.map(s => `<option value="${s}">${esc(s)}</option>`).join('')}
            </select></div>
          <div><label class="text-sm font-medium">Region:</label>
            <select id="book-site-region" class="w-full border rounded p-2 text-sm mt-1" onchange="Views.scheduling._updateSitePreview()">
              ${regions.map(r => `<option value="${r}">${r}</option>`).join('')}
            </select></div>
          <div id="book-site-preview" class="text-xs text-gray-500 bg-gray-50 border rounded p-2 min-h-[2rem] max-h-32 overflow-auto">Select a site to preview devices</div>
        </div>
      `, [
        { label: 'Cancel', handler(){} },
        { label: 'Book Site', className: 'bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium', handler: async () => {
          const site = document.getElementById('book-site-site')?.value;
          const region = document.getElementById('book-site-region')?.value;
          if (!site) { Toast.warning('Select a site'); return; }
          try {
            const results = await ScheduleManager.bookSiteSlot(site, region, date, timeSlot);
            if (results.booked === 0 && results.errors.length === 0) {
              Toast.warning('No eligible devices found for this site/region');
            } else {
              Toast.success(`Booked ${results.booked} device(s)${results.errors.length ? `, ${results.errors.length} failed` : ''}`);
            }
            this.render();
          } catch(e) { Toast.error(e.message); }
        }},
      ]);
    },

    _updateSitePreview() {
      const site = document.getElementById('book-site-site')?.value;
      const region = document.getElementById('book-site-region')?.value;
      const preview = document.getElementById('book-site-preview');
      if (!preview) return;
      if (!site) { preview.textContent = 'Select a site to preview devices'; return; }
      const matching = Views.scheduling._siteDevices.filter(d => d.site === site && d.region === region && d.stage === 'SCHEDULING' && !d.schedule);
      if (matching.length === 0) {
        preview.textContent = `No unscheduled devices in ${site} / ${region}`;
      } else {
        preview.innerHTML = `<strong>${matching.length} device(s) will be booked:</strong><ul class="mt-1 ml-2 list-disc">${matching.map(d => `<li>${esc(d.hostname)} (${esc(d.serial_number)})</li>`).join('')}</ul>`;
      }
    },
  },

          <table class="w-full text-sm">
            <thead><tr class="text-left text-xs text-gray-500 uppercase border-b">
              <th class="px-3 py-2">Hostname</th><th class="px-3 py-2">Serial</th><th class="px-3 py-2">Region</th>
              <th class="px-3 py-2">Stage</th><th class="px-3 py-2">Schedule</th><th class="px-3 py-2">Engineer</th><th class="px-3 py-2">Actions</th>
            </tr></thead>
            <tbody>${devices.map(d => {
              const slot = slots.find(s => s.device_serial === d.serial_number && s.status !== 'cancelled');
              const canUpdate = Auth.can('update_execution', { device: d, region: d.region });
              return `<tr class="border-b hover:bg-gray-50">
                <td class="px-3 py-2 font-medium"><a href="#device-detail/${d.serial_number}" class="text-blue-600 hover:underline">${esc(d.hostname)}</a></td>
                <td class="px-3 py-2 text-xs text-gray-500">${esc(d.serial_number)}</td>
                <td class="px-3 py-2"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs">${esc(d.region||'-')}</span></td>
                <td class="px-3 py-2"><span class="px-2 py-0.5 rounded text-xs text-white" style="background:${stageColor(d.stage)}">${stageLabel(d.stage)}</span></td>
                <td class="px-3 py-2 text-xs">${slot ? `${slot.date} ${slot.time_slot}` : '-'}</td>
                <td class="px-3 py-2 text-xs">${esc(d.assigned_engineer||'-')}</td>
                <td class="px-3 py-2">
                  ${canUpdate && stageIdx(d.stage) < STAGES.length - 1 ? `<button onclick="WorkflowUI.showAdvanceDialog('${d.serial_number}','${d.stage}')" class="bg-blue-600 text-white px-2 py-1 rounded text-xs hover:bg-blue-700">Advance</button>` : ''}
                </td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        </div>`}
      </div>`;
    },
  },

  // ---------- SETTINGS ----------
  settings: {
    async render() {
      const el = document.getElementById('view-settings');
      if (!Auth.can('manage_settings') && !Auth.can('view_audit')) {
        el.innerHTML = '<div class="p-6 text-gray-500">View-only access. Contact admin for changes.</div>';
      }
      const regions = (await DB.get('app_settings','regions'))?.value || DEFAULT_REGIONS;
      const versions = (await DB.get('app_settings','target_versions'))?.value || DEFAULT_TARGET_VERSIONS;
      const timeSlots = (await DB.get('app_settings','time_slots'))?.value || DEFAULT_TIME_SLOTS;
      const maxSlots = (await DB.get('app_settings','max_slots_per_region_time'))?.value || MAX_SLOTS_PER_REGION_TIME;
      const users = await DB.getAll('users');
      const isAdmin = Auth.isAdmin();
      const panoramaUrlVal = (await DB.get('app_settings','panorama_url'))?.value || '';
      const autoSyncVal = (await DB.get('app_settings','auto_sync_enabled'))?.value || false;
      const syncIntervalVal = (await DB.get('app_settings','sync_interval'))?.value || 15;

      el.innerHTML = `<div class="p-6 space-y-6 max-w-4xl">
        <!-- Regions -->
        <div class="bg-white rounded-lg border p-4">
          <h3 class="font-semibold mb-2">Regions</h3>
          <div class="flex flex-wrap gap-2 mb-2" id="settings-regions">${regions.map(r => `<span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm flex items-center gap-1">${r}${isAdmin ? `<button onclick="Views.settings.removeRegion('${r}')" class="text-blue-400 hover:text-red-600">&times;</button>` : ''}</span>`).join('')}</div>
          ${isAdmin ? `<div class="flex gap-2"><input type="text" id="settings-new-region" class="border rounded px-2 py-1 text-sm" placeholder="New region"><button onclick="Views.settings.addRegion()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">Add</button></div>` : ''}
        </div>

        <!-- Target Versions -->
        <div class="bg-white rounded-lg border p-4">
          <h3 class="font-semibold mb-2">Target PAN-OS Versions</h3>
          <div class="flex flex-wrap gap-2 mb-2">${versions.map(v => `<span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm flex items-center gap-1">${v}${isAdmin ? `<button onclick="Views.settings.removeVersion('${v}')" class="text-green-400 hover:text-red-600">&times;</button>` : ''}</span>`).join('')}</div>
          ${isAdmin ? `<div class="flex gap-2"><input type="text" id="settings-new-version" class="border rounded px-2 py-1 text-sm" placeholder="e.g. 11.2.1"><button onclick="Views.settings.addVersion()" class="bg-green-600 text-white px-3 py-1 rounded text-sm">Add</button></div>` : ''}
        </div>

        <!-- Scheduling Config -->
        <div class="bg-white rounded-lg border p-4">
          <h3 class="font-semibold mb-2">Scheduling</h3>
          <div class="flex items-center gap-2 mb-2">
            <label class="text-sm">Max upgrades per slot per region:</label>
            <input type="number" id="settings-max-slots" class="border rounded px-2 py-1 text-sm w-20" value="${maxSlots}" min="1" max="50" ${isAdmin?'':'disabled'}>
            ${isAdmin ? `<button onclick="Views.settings.saveMaxSlots()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">Save</button>` : ''}
          </div>
          <p class="text-xs text-gray-500">Time slots: ${timeSlots.join(', ')}</p>
        </div>

        <!-- Users -->
        <div class="bg-white rounded-lg border p-4">
          <h3 class="font-semibold mb-2">Registered Users (${users.length})</h3>
          <table class="w-full text-sm"><thead><tr class="text-left text-xs text-gray-500 border-b"><th class="pb-1">Username</th><th class="pb-1">Role</th><th class="pb-1">Region</th><th class="pb-1">Last Login</th>${isAdmin?'<th class="pb-1">Actions</th>':''}</tr></thead>
          <tbody>${users.map(u => `<tr class="border-b"><td class="py-1">${esc(u.username)}</td><td class="py-1">${u.role.replace(/_/g,' ')}</td><td class="py-1">${esc(u.region||'-')}</td><td class="py-1 text-gray-400 text-xs">${relTime(u.last_login||u.created_at)}</td>${isAdmin?`<td class="py-1"><button onclick="Views.settings.deleteUser('${u.username}')" class="text-red-500 text-xs hover:underline">Delete</button></td>`:''}</tr>`).join('')}</tbody></table>
        </div>

        <!-- Panorama URL Sync -->
        <div class="bg-white rounded-lg border p-4">
          <h3 class="font-semibold mb-2">Panorama URL Sync</h3>
          <p class="text-xs text-gray-500 mb-3">Fetch a Panorama HTML export from a URL on a schedule. The URL must be reachable from your browser without CORS restrictions.</p>
          <div class="space-y-3">
            <div class="flex gap-2">
              <input type="text" id="settings-panorama-url" class="flex-1 border rounded px-2 py-1.5 text-sm" placeholder="https://panorama.internal/devices.html" value="${esc(panoramaUrlVal)}" ${isAdmin?'':'disabled'}>
              ${isAdmin ? `<button onclick="Views.settings.savePanoramaUrl()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">Save</button>
              <button onclick="URLSync.manualSync()" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-sm" title="Manual sync">&#8635;</button>` : ''}
            </div>
            <div class="flex items-center gap-4 flex-wrap">
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" id="settings-auto-sync" ${autoSyncVal ? 'checked' : ''} ${isAdmin?'':'disabled'} onchange="Views.settings.saveAutoSync(this.checked)">
                Auto-sync enabled
              </label>
              <div class="flex items-center gap-2 text-sm">
                <label>Interval:</label>
                <select id="settings-sync-interval" class="border rounded px-2 py-1 text-sm" ${isAdmin?'':'disabled'} onchange="Views.settings.saveSyncInterval(this.value)">
                  ${[5,10,15,30].map(m => `<option value="${m}" ${syncIntervalVal==m?'selected':''}>${m} min</option>`).join('')}
                </select>
              </div>
              <div id="url-sync-badge" class="flex items-center"></div>
            </div>
          </div>
        </div>

        <!-- Save Location -->
        <div class="bg-white rounded-lg border p-4">
          <h3 class="font-semibold mb-2">Save Location</h3>
          <p class="text-xs text-gray-500 mb-3">Set a persistent file — the app auto-saves there after every change (Chromium only).</p>
          <div class="flex items-center gap-3">
            <span class="text-sm text-gray-700">${FileSync.getSavedPath() ? `&#128193; <strong>${esc(FileSync.getSavedPath())}</strong>` : '<span class="text-gray-400">No custom location set</span>'}</span>
            <button onclick="FileSync.setCustomLocation()" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm">Change Location</button>
            ${FileSync.getSavedPath() ? `<button onclick="DB.del('app_settings','file_handle').then(()=>{FileSync.customFileHandle=null;Views.settings.render();})" class="text-red-500 text-sm hover:underline">Clear</button>` : ''}
          </div>
        </div>

        <!-- Data Management -->
        <div class="bg-white rounded-lg border p-4">
          <h3 class="font-semibold mb-2">Data Management</h3>
          <div class="flex flex-wrap gap-2">
            <button onclick="FileSync.promptSave()" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm">Export JSON</button>
            <button onclick="FileSync.promptLoad()" class="bg-gray-200 px-3 py-1.5 rounded text-sm">Import JSON</button>
            ${isAdmin ? `<button onclick="Views.settings.clearAllData()" class="bg-red-600 text-white px-3 py-1.5 rounded text-sm">Clear All Data</button>` : ''}
            ${isAdmin ? `<button onclick="SampleData.generate()" class="bg-purple-600 text-white px-3 py-1.5 rounded text-sm">Generate Sample Data</button>` : ''}
            ${isAdmin ? `<button onclick="TestSuite.runAll()" class="bg-yellow-600 text-white px-3 py-1.5 rounded text-sm">Run Tests</button>` : ''}
          </div>
        </div>

        <!-- App Info -->
        <div class="text-xs text-gray-400">
          PAN-OS Upgrade Tracker v1.1 &bull; Data stored in IndexedDB &bull; ${(await DB.count('devices'))} devices &bull; ${(await DB.count('audit_log'))} audit entries
        </div>
      </div>`;
      // Update URL sync badge now that DOM is rendered
      URLSync.updateStatusUI();
    },

    async addRegion() {
      const input = document.getElementById('settings-new-region');
      const val = input?.value?.trim().toUpperCase();
      if (!val) return;
      const setting = await DB.get('app_settings','regions');
      const regions = setting?.value || [];
      if (regions.includes(val)) { Toast.warning('Region already exists'); return; }
      regions.push(val);
      await DB.put('app_settings', { key:'regions', value: regions });
      await AuditLog.log('SETTINGS_CHANGE', null, { setting: 'regions', action: 'add', value: val });
      Toast.success(`Region ${val} added`);
      this.render();
    },

    async removeRegion(region) {
      const setting = await DB.get('app_settings','regions');
      const regions = (setting?.value || []).filter(r => r !== region);
      await DB.put('app_settings', { key:'regions', value: regions });
      await AuditLog.log('SETTINGS_CHANGE', null, { setting: 'regions', action: 'remove', value: region });
      Toast.success(`Region ${region} removed`);
      this.render();
    },

    async addVersion() {
      const input = document.getElementById('settings-new-version');
      const val = input?.value?.trim();
      if (!val) return;
      const setting = await DB.get('app_settings','target_versions');
      const versions = setting?.value || [];
      if (versions.includes(val)) { Toast.warning('Version already exists'); return; }
      versions.push(val);
      await DB.put('app_settings', { key:'target_versions', value: versions });
      Toast.success(`Version ${val} added`);
      this.render();
    },

    async removeVersion(version) {
      const setting = await DB.get('app_settings','target_versions');
      const versions = (setting?.value || []).filter(v => v !== version);
      await DB.put('app_settings', { key:'target_versions', value: versions });
      Toast.success(`Version ${version} removed`);
      this.render();
    },

    async saveMaxSlots() {
      const val = parseInt(document.getElementById('settings-max-slots')?.value) || 3;
      await DB.put('app_settings', { key:'max_slots_per_region_time', value: val });
      Toast.success('Max slots updated');
    },

    async savePanoramaUrl() {
      const url = document.getElementById('settings-panorama-url')?.value?.trim();
      await DB.put('app_settings', { key: 'panorama_url', value: url });
      Toast.success(url ? 'Panorama URL saved' : 'Panorama URL cleared');
      // Restart sync if enabled
      const enabled = (await DB.get('app_settings','auto_sync_enabled'))?.value;
      const interval = (await DB.get('app_settings','sync_interval'))?.value || 15;
      if (url && enabled) URLSync.start(url, interval); else URLSync.stop();
    },

    async saveAutoSync(enabled) {
      await DB.put('app_settings', { key: 'auto_sync_enabled', value: enabled });
      const url = (await DB.get('app_settings','panorama_url'))?.value;
      const interval = (await DB.get('app_settings','sync_interval'))?.value || 15;
      if (enabled && url) URLSync.start(url, interval); else URLSync.stop();
      Toast.success(enabled ? 'Auto-sync enabled' : 'Auto-sync disabled');
    },

    async saveSyncInterval(minutes) {
      const val = parseInt(minutes) || 15;
      await DB.put('app_settings', { key: 'sync_interval', value: val });
      const url = (await DB.get('app_settings','panorama_url'))?.value;
      const enabled = (await DB.get('app_settings','auto_sync_enabled'))?.value;
      if (enabled && url) URLSync.start(url, val);
      Toast.success(`Sync interval set to ${val} min`);
    },

    async deleteUser(username) {
      if (username === Auth.currentUser?.username) { Toast.warning('Cannot delete yourself'); return; }
      Modal.confirm('Delete User', `Remove ${username} from the registry?`, async () => {
        await DB.del('users', username);
        Toast.success(`User ${username} deleted`);
        this.render();
      });
    },

    async clearAllData() {
      Modal.confirm('Clear All Data', 'This will delete ALL devices, audit logs, schedules, and settings. This cannot be undone!', async () => {
        for (const store of ['devices','audit_log','sync_history','schedule_slots']) await DB.clear(store);
        await AuditLog.log('CLEAR_ALL_DATA');
        Toast.success('All data cleared');
        Router.navigate('#dashboard');
      });
    },
  },

  // ---------- AUDIT LOG ----------
  audit: {
    async render() {
      const el = document.getElementById('view-audit');
      const logs = (await DB.getAll('audit_log')).reverse();
      const users = [...new Set(logs.map(l => l.user))].sort();
      const actions = [...new Set(logs.map(l => l.action))].sort();

      el.innerHTML = `<div class="p-6 space-y-4">
        <div class="flex items-center gap-2 flex-wrap">
          <input type="text" id="audit-search" class="border rounded-lg px-3 py-1.5 text-sm w-64" placeholder="Search..." oninput="Views.audit.filter()">
          <select id="audit-filter-user" class="border rounded-lg px-3 py-1.5 text-sm" onchange="Views.audit.filter()">
            <option value="">All Users</option>${users.map(u => `<option value="${u}">${u}</option>`).join('')}
          </select>
          <select id="audit-filter-action" class="border rounded-lg px-3 py-1.5 text-sm" onchange="Views.audit.filter()">
            <option value="">All Actions</option>${actions.map(a => `<option value="${a}">${a}</option>`).join('')}
          </select>
          <span class="text-sm text-gray-500">${logs.length} entries</span>
        </div>
        <div class="bg-white rounded-lg border overflow-auto" style="max-height:calc(100vh - 200px)">
          <table class="w-full text-xs">
            <thead class="sticky top-0 bg-gray-50"><tr class="text-left text-gray-500 border-b">
              <th class="px-3 py-2">Timestamp</th><th class="px-3 py-2">User</th><th class="px-3 py-2">Role</th>
              <th class="px-3 py-2">Action</th><th class="px-3 py-2">Device</th><th class="px-3 py-2">Details</th>
            </tr></thead>
            <tbody id="audit-table-body"></tbody>
          </table>
        </div>
      </div>`;
      this._allLogs = logs;
      this.filter();
    },

    _allLogs: [],

    filter() {
      const search = (document.getElementById('audit-search')?.value || '').toLowerCase();
      const user = document.getElementById('audit-filter-user')?.value || '';
      const action = document.getElementById('audit-filter-action')?.value || '';
      let filtered = this._allLogs;
      if (user) filtered = filtered.filter(l => l.user === user);
      if (action) filtered = filtered.filter(l => l.action === action);
      if (search) filtered = filtered.filter(l => JSON.stringify(l).toLowerCase().includes(search));
      const showing = filtered.slice(0, 200);

      const tbody = document.getElementById('audit-table-body');
      if (!tbody) return;
      tbody.innerHTML = showing.map(l => `<tr class="border-b hover:bg-gray-50">
        <td class="px-3 py-1.5 text-gray-400">${formatDate(l.timestamp)}</td>
        <td class="px-3 py-1.5 font-medium">${esc(l.user)}</td>
        <td class="px-3 py-1.5 text-gray-500">${esc(l.role||'-')}</td>
        <td class="px-3 py-1.5"><span class="bg-gray-100 px-2 py-0.5 rounded">${esc(l.action)}</span></td>
        <td class="px-3 py-1.5">${l.device_serial ? `<a href="#device-detail/${l.device_serial}" class="text-blue-600 hover:underline">${esc(l.device_serial)}</a>` : '-'}</td>
        <td class="px-3 py-1.5 text-gray-500 max-w-xs truncate" title="${esc(JSON.stringify(l.details||{}))}">${esc(JSON.stringify(l.details||{}).substring(0,100))}</td>
      </tr>`).join('');
    },
  },
};

// ============================================================
// APP INITIALIZATION
// ============================================================
const App = {
  async init() {
    try {
      await DB.open();
      await this.initDefaults();
      if (typeof dayjs !== 'undefined') {
        dayjs.extend(dayjs_plugin_utc);
        dayjs.extend(dayjs_plugin_timezone);
        dayjs.extend(dayjs_plugin_relativeTime);
      }
      await Auth.init();
      await FileSync.loadCustomLocation();
      // Start URL sync if configured
      const panoUrl = await DB.get('app_settings', 'panorama_url');
      const autoSync = await DB.get('app_settings', 'auto_sync_enabled');
      if (panoUrl?.value && autoSync?.value) {
        const interval = (await DB.get('app_settings', 'sync_interval'))?.value || 15;
        URLSync.start(panoUrl.value, interval);
      }
      // Set copyright footer text from config
      const footerEl = document.getElementById('copyright-footer');
      if (footerEl && window.APP_COPYRIGHT) {
        footerEl.textContent = window.APP_COPYRIGHT;
      }
    } catch(err) {
      console.error('Init failed:', err);
      document.body.innerHTML = `<div class="p-8"><h1 class="text-xl font-bold text-red-600">Initialization Error</h1><p class="mt-2 text-gray-600">${err.message}</p><p class="mt-1 text-sm text-gray-400">Ensure your browser supports IndexedDB and try refreshing.</p></div>`;
    }
  },

  async initDefaults() {
    const defaults = [
      ['regions', DEFAULT_REGIONS],
      ['target_versions', DEFAULT_TARGET_VERSIONS],
      ['time_slots', DEFAULT_TIME_SLOTS],
      ['max_slots_per_region_time', MAX_SLOTS_PER_REGION_TIME],
      ['panorama_url', ''],
      ['auto_sync_enabled', false],
      ['sync_interval', 15],
    ];
    for (const [key, value] of defaults) {
      const existing = await DB.get('app_settings', key);
      if (!existing) await DB.put('app_settings', { key, value });
    }
  },
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
